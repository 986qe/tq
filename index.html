<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>霓虹跑酷 - 地铁跑酷风格</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    .container {
      position: relative;
      width: 100%;
      max-width: 600px;
      height: 100vh;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    .tip {
      position: absolute;
      bottom: 12px;
      left: 0; right: 0;
      text-align: center;
      color: #6b7280;
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <canvas id="game"></canvas>
    <p class="tip">← → 切换跑道 | 空格/↑ 跳跃 | ↓ 滑铲</p>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    let W, H;

    function resizeCanvas() {
      const container = canvas.parentElement;
      W = container.clientWidth;
      H = container.clientHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.scale(dpr, dpr);
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    // 游戏参数
    const LANE_COUNT = 3;
    const LANE_WIDTH = 80;
    const LANE_GAP = 25;
    const GROUND_Y_RATIO = 0.90;
    const HORIZON_Y_RATIO = 0.25;
    const PERSPECTIVE_DEPTH = 800;

    let player, obstacles, particles, score, speed, maxSpeed, gameOver, started;
    let spawnTimer, frameCount, highScore;
    let shakeTimer = 0, shakeIntensity = 0;
    let paused = false;

    highScore = parseInt(localStorage.getItem("parkour3dHighScore") || "0");

    function getGroundY() { return H * GROUND_Y_RATIO; }
    function getHorizonY() { return H * HORIZON_Y_RATIO; }
    function getVanishX() { return W * 0.5; }

    function resetGame() {
      player = {
        lane: 1, targetLane: 1,
        y: getGroundY() - 80,
        width: 50, height: 75,
        velocityY: 0, onGround: true,
        isSliding: false, slideTimer: 0,
        laneX: getVanishX(), laneTransition: 1
      };
      obstacles = [];
      particles = [];
      score = 0;
      speed = 2;
      maxSpeed = 5;
      gameOver = false;
      started = true;
      paused = false;
      spawnTimer = 0;
      frameCount = 0;
      shakeTimer = 0;
    }

    // 透视投影 - 三条跑道不交叉
    function project3D(z) {
      const vanishY = getHorizonY();
      const groundY = getGroundY();
      const vanishX = getVanishX();
      const ratio = 1 - z / PERSPECTIVE_DEPTH;
      const y = vanishY + (groundY - vanishY) * Math.pow(ratio, 1.8);
      const scale = Math.pow(ratio, 1.5);
      return { y, scale, vanishX };
    }

    // 获取某条跑道在某个z位置的x中心
    function getLaneCenterX(lane, z) {
      const vanishX = getVanishX();
      const proj = project3D(z);
      const laneSpacing = (LANE_WIDTH + LANE_GAP) * proj.scale;
      const offset = (lane - 1) * laneSpacing;
      return vanishX + offset;
    }

    function moveLane(dir) {
      if (gameOver || !started || paused) return;
      const newLane = player.targetLane + dir;
      if (newLane >= 0 && newLane < LANE_COUNT) {
        player.targetLane = newLane;
        player.laneTransition = 0;
      }
    }

    function jump() {
      if (player.onGround && !gameOver && !player.isSliding && started && !paused) {
        player.velocityY = -20;
        player.onGround = false;
        createParticles(player.x, getGroundY(), "#00f5ff", 6);
      }
    }

    function slide() {
      if (player.onGround && !player.isSliding && !gameOver && started && !paused) {
        player.isSliding = true;
        player.slideTimer = 35;
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "ArrowLeft" || e.code === "KeyA") { e.preventDefault(); moveLane(-1); }
      if (e.code === "ArrowRight" || e.code === "KeyD") { e.preventDefault(); moveLane(1); }
      if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") {
        e.preventDefault();
        if (!started || gameOver) { resetGame(); return; }
        jump();
      }
      if (e.code === "ArrowDown" || e.code === "KeyS") { e.preventDefault(); slide(); }
      if (e.code === "KeyR" && gameOver) { resetGame(); }
      if (e.code === "Escape" && started && !gameOver) { paused = !paused; }
    });

    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: false });

    canvas.addEventListener("touchend", (e) => {
      e.preventDefault();
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (!started || gameOver) { resetGame(); return; }
      if (Math.abs(dx) > Math.abs(dy)) {
        if (Math.abs(dx) > 30) moveLane(dx > 0 ? 1 : -1);
      } else {
        if (dy < -30) jump();
        else if (dy > 30) slide();
      }
    }, { passive: false });

    canvas.addEventListener("click", () => { if (!started || gameOver) resetGame(); });

    function createParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 10,
          vy: (Math.random() - 0.5) * 8 - 3,
          life: 25 + Math.random() * 20,
          maxLife: 45,
          color,
          size: 2 + Math.random() * 4
        });
      }
    }

    function createObstacle() {
      const lane = Math.floor(Math.random() * LANE_COUNT);
      const type = Math.random() > 0.5 ? "railing" : "car";
      obstacles.push({
        lane,
        z: PERSPECTIVE_DEPTH + 50,
        type,
        width: type === "car" ? 60 : 70,
        height: type === "car" ? 45 : 30,
        hit: false
      });
    }

    function isColliding3D(obstacle) {
      if (obstacle.hit || obstacle.lane !== player.targetLane) return false;
      if (obstacle.z > 55 || obstacle.z < -10) return false;
      if (obstacle.type === "railing" && player.isSliding) return false;
      if (obstacle.type === "car" && !player.onGround && player.y < getGroundY() - 80) return false;
      return Math.abs(obstacle.z) < 35;
    }

    function update() {
      if (gameOver || !started || paused) return;
      frameCount++;

      // 玩家物理
      player.velocityY += 0.8;
      player.y += player.velocityY;
      const groundY = getGroundY();
      if (player.y + player.height >= groundY) {
        player.y = groundY - player.height;
        player.velocityY = 0;
        player.onGround = true;
      }

      // 滑铲计时
      if (player.isSliding) {
        player.slideTimer--;
        if (player.slideTimer <= 0) player.isSliding = false;
      }

      // 跑道切换动画
      player.laneTransition += 0.12;
      const startX = getLaneCenterX(player.lane, 50);
      const endX = getLaneCenterX(player.targetLane, 50);
      player.laneX = startX + (endX - startX) * Math.min(player.laneTransition, 1);
      if (player.laneTransition >= 1) player.lane = player.targetLane;

      player.x = player.laneX - player.width / 2;

      // 生成障碍物
      const spawnInterval = Math.max(30, 55 - Math.floor(speed) * 4);
      spawnTimer++;
      if (spawnTimer > spawnInterval + Math.random() * 25) {
        createObstacle();
        if (speed > 3.5 && Math.random() > 0.65) createObstacle();
        spawnTimer = 0;
      }

      // 移动障碍物
      obstacles.forEach(o => o.z -= speed);
      obstacles = obstacles.filter(o => o.z > -80);

      // 碰撞检测
      for (const obstacle of obstacles) {
        if (isColliding3D(obstacle)) {
          obstacle.hit = true;
          gameOver = true;
          shakeTimer = 15;
          shakeIntensity = 8;
          createParticles(player.x + player.width / 2, player.y + player.height / 2, "#ff0066", 30);
          if (Math.floor(score / 10) > highScore) {
            highScore = Math.floor(score / 10);
            localStorage.setItem("parkour3dHighScore", highScore.toString());
          }
          break;
        }
      }

      // 更新粒子
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2;
        p.life--;
      });
      particles = particles.filter(p => p.life > 0);

      // 屏幕震动
      if (shakeTimer > 0) shakeTimer--;

      // 分数和速度 - 渐进式加速 2x -> 5x
      score += Math.floor(speed / 2);

      if (speed < maxSpeed) {
        if (score > 300) speed += 0.003;
        else if (score > 100) speed += 0.001;
        speed = Math.min(speed, maxSpeed);
      }
    }

    // ========== 绘制三条独立跑道 ==========
    function drawTrack() {
      const vanishX = getVanishX();
      const vanishY = getHorizonY();
      const groundY = getGroundY();

      // 天空渐变
      const skyGrad = ctx.createLinearGradient(0, 0, 0, vanishY);
      skyGrad.addColorStop(0, "#0a0a1a");
      skyGrad.addColorStop(1, "#1a1a3a");
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, vanishY);

      // 星空
      ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
      for (let i = 0; i < 60; i++) {
        const sx = (i * 73 + frameCount * 0.1) % W;
        const sy = (i * 37) % (vanishY - 20);
        ctx.beginPath();
        ctx.arc(sx, sy, (i % 3) + 1, 0, Math.PI * 2);
        ctx.fill();
      }

      // 远景建筑
      ctx.fillStyle = "#0f0f2a";
      for (let i = 0; i < 10; i++) {
        const bx = (i * 80 - frameCount * 0.2) % (W + 60) - 30;
        const bh = 40 + (i * 43) % 80;
        ctx.fillRect(bx, vanishY - bh, 35, bh);
        ctx.fillStyle = "rgba(0, 245, 255, 0.1)";
        for (let wy = vanishY - bh + 6; wy < vanishY - 5; wy += 14) {
          ctx.fillRect(bx + 5, wy, 4, 6);
          ctx.fillRect(bx + 20, wy, 4, 6);
        }
        ctx.fillStyle = "#0f0f2a";
      }

      // 地面
      const groundGrad = ctx.createLinearGradient(0, vanishY, 0, H);
      groundGrad.addColorStop(0, "#0a0a1a");
      groundGrad.addColorStop(1, "#1a1a3a");
      ctx.fillStyle = groundGrad;
      ctx.fillRect(0, vanishY, W, H - vanishY);

      // 绘制三条独立跑道（不交叉）
      for (let lane = 0; lane < LANE_COUNT; lane++) {
        drawSingleLane(lane);
      }

      // 跑道之间的间隔
      for (let i = 0; i < LANE_COUNT - 1; i++) {
        drawLaneGap(i);
      }
    }

    function drawSingleLane(lane) {
      const vanishX = getVanishX();
      const vanishY = getHorizonY();
      const groundY = getGroundY();

      // 跑道近端
      const nearHalfWidth = LANE_WIDTH / 2;
      const nearX = vanishX + (lane - 1) * (LANE_WIDTH + LANE_GAP);

      // 跑道远端
      const farScale = 0.05;
      const farHalfWidth = LANE_WIDTH * farScale / 2;
      const farX = vanishX + (lane - 1) * (LANE_WIDTH + LANE_GAP) * farScale;

      // 跑道面 - 白色
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(farX - farHalfWidth, vanishY);
      ctx.lineTo(nearX - nearHalfWidth, groundY);
      ctx.lineTo(nearX + nearHalfWidth, groundY);
      ctx.lineTo(farX + farHalfWidth, vanishY);
      ctx.closePath();
      ctx.fillStyle = "rgba(255, 255, 255, 0.12)";
      ctx.fill();

      // 跑道边框 - 白色发光
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.shadowColor = "#ffffff";
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(farX - farHalfWidth, vanishY);
      ctx.lineTo(nearX - nearHalfWidth, groundY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(farX + farHalfWidth, vanishY);
      ctx.lineTo(nearX + nearHalfWidth, groundY);
      ctx.stroke();
      ctx.shadowBlur = 0;

      // 跑道上的移动横线（速度感）
      ctx.strokeStyle = "rgba(255, 255, 255, 0.06)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 25; i++) {
        const z = ((frameCount * speed * 3 + i * 35) % PERSPECTIVE_DEPTH);
        const proj = project3D(z);
        const laneX = vanishX + (lane - 1) * (LANE_WIDTH + LANE_GAP) * proj.scale;
        const lw = LANE_WIDTH * proj.scale;
        ctx.beginPath();
        ctx.moveTo(laneX - lw / 2, proj.y);
        ctx.lineTo(laneX + lw / 2, proj.y);
        ctx.stroke();
      }

      ctx.restore();
    }

    function drawLaneGap(index) {
      const vanishX = getVanishX();
      const vanishY = getHorizonY();
      const groundY = getGroundY();

      const nearX = vanishX + (index - 0.5) * (LANE_WIDTH + LANE_GAP) + LANE_WIDTH;
      const farScale = 0.05;
      const farX = vanishX + (index - 0.5) * (LANE_WIDTH + LANE_GAP) * farScale + LANE_WIDTH * farScale;

      const gapHalfWidth = LANE_GAP / 2;
      const farGapHalf = LANE_GAP * farScale / 2;

      // 深渊效果
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(farX - farGapHalf, vanishY);
      ctx.lineTo(nearX - gapHalfWidth, groundY);
      ctx.lineTo(nearX + gapHalfWidth, groundY);
      ctx.lineTo(farX + farGapHalf, vanishY);
      ctx.closePath();
      ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
      ctx.fill();

      // 蓝色分割线
      ctx.strokeStyle = "rgba(0, 245, 255, 0.5)";
      ctx.lineWidth = 2;
      ctx.shadowColor = "#00f5ff";
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(farX, vanishY);
      ctx.lineTo(nearX, groundY);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function drawStickmanBackView(x, y, w, h, isSliding, runFrame) {
      ctx.save();
      const cx = x + w / 2;

      const color = isSliding ? "#ff00aa" : "#00f5ff";
      ctx.strokeStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";

      const legSwing = Math.sin(runFrame * 0.35) * 10;
      const armSwing = Math.sin(runFrame * 0.35 + Math.PI) * 7;

      if (isSliding) {
        const headY = y + h - 15;
        const bodyY = y + h - 5;
        ctx.beginPath();
        ctx.arc(cx, headY, 5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, headY + 5);
        ctx.lineTo(cx, bodyY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, bodyY);
        ctx.lineTo(cx + 15, bodyY + 5);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, bodyY);
        ctx.lineTo(cx - 8, bodyY + 5);
        ctx.stroke();
      } else {
        const headY = y + 8;
        const bodyTopY = y + 15;
        const bodyBotY = y + h - 18;

        ctx.beginPath();
        ctx.arc(cx, headY, 7, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, bodyTopY);
        ctx.lineTo(cx, bodyBotY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, bodyBotY);
        ctx.lineTo(cx - legSwing, y + h);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, bodyBotY);
        ctx.lineTo(cx + legSwing, y + h);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, bodyTopY + 3);
        ctx.lineTo(cx - armSwing - 3, bodyTopY + 16);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx, bodyTopY + 3);
        ctx.lineTo(cx + armSwing + 3, bodyTopY + 16);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function drawObstacles3D() {
      const vanishX = getVanishX();
      const sorted = [...obstacles].sort((a, b) => b.z - a.z);

      for (const o of sorted) {
        if (o.z < -10 || o.z > PERSPECTIVE_DEPTH + 50) continue;
        const proj = project3D(o.z);
        const ox = getLaneCenterX(o.lane, o.z);
        const ow = o.width * proj.scale;
        const oh = o.height * proj.scale;
        if (proj.scale < 0.02) continue;

        ctx.save();
        const drawX = ox - ow / 2;
        const drawY = proj.y - oh;

        if (o.type === "railing") {
          // 栏杆 - 橙色
          ctx.fillStyle = "#ff6600";
          ctx.shadowColor = "#ff6600";
          ctx.shadowBlur = proj.scale * 15;
          ctx.fillRect(drawX, drawY, ow, oh * 0.3);
          const pillarW = ow * 0.08;
          ctx.fillRect(drawX, drawY, pillarW, oh);
          ctx.fillRect(drawX + ow - pillarW, drawY, pillarW, oh);
          ctx.fillStyle = "#0a0a1a";
          for (let i = 0; i < oh * 0.3; i += Math.max(3, 6 * proj.scale)) {
            ctx.fillRect(drawX + pillarW, drawY + i, ow - pillarW * 2, Math.max(2, 2 * proj.scale));
          }
        } else {
          // 小汽车 - 红色
          ctx.fillStyle = "#ff0044";
          ctx.shadowColor = "#ff0044";
          ctx.shadowBlur = proj.scale * 15;
          const carBodyH = oh * 0.6;
          const carTopH = oh * 0.35;
          const carTopW = ow * 0.6;
          ctx.fillRect(drawX, drawY + oh * 0.35, ow, carBodyH);
          const topOffsetX = (ow - carTopW) / 2;
          ctx.fillRect(drawX + topOffsetX, drawY, carTopW, carTopH);
          ctx.fillStyle = "#0a0a1a";
          ctx.fillRect(drawX + topOffsetX + 4 * proj.scale, drawY + 3 * proj.scale, carTopW - 8 * proj.scale, carTopH - 6 * proj.scale);
          ctx.fillStyle = "#333333";
          const wheelR = ow * 0.12;
          ctx.beginPath();
          ctx.arc(drawX + ow * 0.25, drawY + oh, wheelR, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(drawX + ow * 0.75, drawY + oh, wheelR, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#ffdd00";
          ctx.fillRect(drawX, drawY + oh * 0.4, ow * 0.1, oh * 0.15);
          ctx.fillRect(drawX + ow * 0.9, drawY + oh * 0.4, ow * 0.1, oh * 0.15);
        }
        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }

    function drawPlayer() {
      drawStickmanBackView(
        player.x,
        player.y,
        player.width,
        player.isSliding ? 30 : player.height,
        player.isSliding,
        frameCount
      );
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.save();
        const alpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = alpha;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawHUD() {
      ctx.fillStyle = "#00f5ff";
      ctx.font = "bold 24px Arial";
      ctx.textAlign = "left";
      ctx.shadowColor = "#00f5ff";
      ctx.shadowBlur = 8;
      ctx.fillText("分数: " + Math.floor(score / 10), 15, 35);
      ctx.shadowBlur = 0;

      ctx.fillStyle = "#ff00aa";
      ctx.font = "16px Arial";
      ctx.textAlign = "right";
      ctx.fillText("速度: " + speed.toFixed(1) + "x", W - 15, 35);

      if (paused) {
        ctx.fillStyle = "rgba(10, 10, 26, 0.7)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#00f5ff";
        ctx.font = "bold 36px Arial";
        ctx.textAlign = "center";
        ctx.shadowColor = "#00f5ff";
        ctx.shadowBlur = 20;
        ctx.fillText("已暂停", W / 2, H / 2 - 10);
        ctx.font = "16px Arial";
        ctx.fillStyle = "#6b7280";
        ctx.shadowBlur = 0;
        ctx.fillText("按 ESC 继续", W / 2, H / 2 + 20);
      }
    }

    function drawStartScreen() {
      ctx.fillStyle = "rgba(10, 10, 26, 0.9)";
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "#00f5ff";
      ctx.font = "bold 48px Arial";
      ctx.textAlign = "center";
      ctx.shadowColor = "#00f5ff";
      ctx.shadowBlur = 30;
      ctx.fillText("霓虹跑酷", W / 2, H / 2 - 80);
      ctx.shadowBlur = 0;

      ctx.fillStyle = "#ff00aa";
      ctx.font = "18px Arial";
      ctx.fillText("NEON PARKOUR 3D", W / 2, H / 2 - 50);

      ctx.fillStyle = "#9ca3af";
      ctx.font = "14px Arial";
      ctx.fillText("← → 切换跑道  |  空格/↑ 跳跃  |  ↓ 滑铲", W / 2, H / 2);
      ctx.fillText("ESC 暂停  |  手机：滑动控制", W / 2, H / 2 + 25);

      ctx.fillStyle = "#6b7280";
      ctx.font = "16px Arial";
      ctx.fillText("点击屏幕 或 按空格键开始", W / 2, H / 2 + 60);

      ctx.fillStyle = "#8b5cf6";
      ctx.font = "18px Arial";
      ctx.shadowColor = "#8b5cf6";
      ctx.shadowBlur = 10;
      ctx.fillText("最高分: " + highScore, W / 2, H / 2 + 95);
      ctx.shadowBlur = 0;
    }

    function drawGameOver() {
      if (!gameOver) return;

      ctx.fillStyle = "rgba(10, 10, 26, 0.85)";
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "#ff0066";
      ctx.font = "bold 42px Arial";
      ctx.textAlign = "center";
      ctx.shadowColor = "#ff0066";
      ctx.shadowBlur = 20;
      ctx.fillText("游戏结束", W / 2, H / 2 - 50);
      ctx.shadowBlur = 0;

      ctx.fillStyle = "#00f5ff";
      ctx.font = "bold 28px Arial";
      ctx.fillText("得分: " + Math.floor(score / 10), W / 2, H / 2);

      ctx.fillStyle = "#8b5cf6";
      ctx.font = "18px Arial";
      ctx.fillText("最高分: " + highScore, W / 2, H / 2 + 35);

      if (Math.floor(score / 10) >= highScore && highScore > 0) {
        ctx.fillStyle = "#ffdd00";
        ctx.font = "16px Arial";
        ctx.fillText("🎉 新纪录！", W / 2, H / 2 + 60);
      }

      ctx.fillStyle = "#6b7280";
      ctx.font = "14px Arial";
      ctx.fillText("点击屏幕 或 按 R 重新开始", W / 2, H / 2 + 95);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      ctx.save();
      if (shakeTimer > 0) {
        const sx = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 15);
        const sy = (Math.random() - 0.5) * shakeIntensity * (shakeTimer / 15);
        ctx.translate(sx, sy);
      }

      if (!started) {
        drawTrack();
        drawStartScreen();
      } else {
        drawTrack();
        drawObstacles3D();
        drawPlayer();
        drawParticles();
        drawHUD();
        drawGameOver();
      }

      ctx.restore();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // 初始化
    started = false;
    gameOver = true;
    frameCount = 0;
    score = 0;
    speed = 2;
    maxSpeed = 5;
    obstacles = [];
    particles = [];
    player = {
      lane: 1, targetLane: 1,
      x: getVanishX() - 25, y: getGroundY() - 80,
      width: 50, height: 75, velocityY: 0, onGround: true,
      isSliding: false, slideTimer: 0,
      laneX: getVanishX(), laneTransition: 1
    };
    gameLoop();
  </script>
</body>
</html>
