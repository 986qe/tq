<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>霓虹跑酷 - 地铁跑酷风格</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    .container {
      position: relative;
      width: 100%;
      max-width: 600px;
      height: 100vh;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    .tip {
      position: absolute;
      bottom: 12px;
      left: 0; right: 0;
      text-align: center;
      color: #6b7280;
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <canvas id="game"></canvas>
    <p class="tip">← → 跑道 | W/空格 跳跃 | S/鼠标右键 滑铲(按住) | ESC 暂停</p>
  </div>

  <script>
    "use strict";

    // ============================================================
    // Canvas 初始化 + 高分屏适配
    // ============================================================
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d", { alpha: false });
    const dpr = Math.min(window.devicePixelRatio || 1, 2); // 限制 dpr 避免过度渲染
    let W = 0, H = 0;
    let groundY = 0, horizonY = 0, vanishX = 0;

    function resizeCanvas() {
      const container = canvas.parentElement;
      W = container.clientWidth;
      H = container.clientHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      // 更新派生量
      groundY = H * GROUND_Y_RATIO;
      horizonY = H * HORIZON_Y_RATIO;
      vanishX = W * 0.5;
    }

    // ============================================================
    // 游戏参数
    // ============================================================
    const LANE_COUNT = 3;
    const LANE_WIDTH = 80;
    const LANE_GAP = 25;
    const GROUND_Y_RATIO = 0.90;
    const HORIZON_Y_RATIO = 0.25;
    const PERSPECTIVE_DEPTH = 800;
    const PLAYER_HEIGHT_NORMAL = 75;
    const PLAYER_HEIGHT_SLIDE = 30;
    const PLAYER_WIDTH = 50;
    const PLAYER_HEAD_OFFSET = 8; // 头到 y 的偏移
    const GRAVITY = 0.8;
    const JUMP_FORCE = -20;
    const LANE_SWITCH_SPEED = 0.12;

    // 星空
    const STARS = (() => {
      const arr = [];
      for (let i = 0; i < 40; i++) {
        arr.push({ x: Math.random() * 1000, y: Math.random() * 200, r: 1 + (i % 3) });
      }
      return arr;
    })();

    // 远景建筑（预生成）
    const BUILDINGS = (() => {
      const arr = [];
      for (let i = 0; i < 12; i++) {
        arr.push({ x: i * 80, h: 40 + (i * 43) % 80 });
      }
      return arr;
    })();

    // 跑道上的横线 z 偏移（预生成）
    const TRACK_LINES = (() => {
      const arr = [];
      for (let i = 0; i < 20; i++) arr.push(i * 40);
      return arr;
    })();

    // ============================================================
    // 难度模式
    // ============================================================
    const DIFFICULTIES = {
      easy:   { name: "简单", startSpeed: 2, maxSpeed: 5, color: "#22d3ee" },
      normal: { name: "普通", startSpeed: 4, maxSpeed: 8, color: "#ff00aa" },
      hard:   { name: "困难", startSpeed: 5, maxSpeed: 10, color: "#ff0044" }
    };
    let selectedDifficulty = "easy"; // 默认简单模式
    function getDifficulty() { return DIFFICULTIES[selectedDifficulty]; }

    // ============================================================
    // 游戏状态
    // ============================================================
    let player, obstacles, particles, score, speed, maxSpeed, gameOver, started;
    let spawnTimer, frameCount, highScore, scoreDisplay;
    let shakeTimer = 0, shakeIntensity = 0;
    let paused = false;

    try {
      highScore = parseInt(localStorage.getItem("parkour3dHighScore") || "0") || 0;
    } catch (e) {
      highScore = 0;
    }
    scoreDisplay = 0;

    // ============================================================
    // 重置游戏
    // ============================================================
    function resetGame() {
      player = {
        lane: 1,
        targetLane: 1,
        x: vanishX - PLAYER_WIDTH / 2,
        y: groundY - PLAYER_HEIGHT_NORMAL,
        width: PLAYER_WIDTH,
        height: PLAYER_HEIGHT_NORMAL,
        velocityY: 0,
        onGround: true,
        isSliding: false,
        slideTimer: 0,
        laneX: vanishX,
        laneTransition: 1
      };
      obstacles = [];
      particles = [];
      score = 0;
      scoreDisplay = 0;
      const diff = getDifficulty();
      speed = diff.startSpeed;
      maxSpeed = diff.maxSpeed;
      gameOver = false;
      started = true;
      paused = false;
      spawnTimer = 0;
      frameCount = 0;
      shakeTimer = 0;
      // 重置滑铲状态，避免重新开始游戏时仍处于滑铲中
      slideHold = false;
      mouseSlideHold = false;
    }

    // ============================================================
    // 透视投影（内联优化版本）
    // ============================================================
    const diffGround = 0; // 占位，groundY - horizonY
    function projectFast(z) {
      const ratio = 1 - z / PERSPECTIVE_DEPTH;
      const ratioPow = Math.pow(ratio, 1.5);
      return {
        y: horizonY + (groundY - horizonY) * Math.pow(ratio, 1.8),
        s: ratioPow
      };
    }

    // 获取某条跑道在某个 z 位置的 x 中心（仅返回必要字段）
    function getLaneX(lane, scale) {
      return vanishX + (lane - 1) * (LANE_WIDTH + LANE_GAP) * scale;
    }

    // ============================================================
    // 输入
    // ============================================================
    function moveLane(dir) {
      if (gameOver || !started || paused) return;
      const nl = player.targetLane + dir;
      if (nl >= 0 && nl < LANE_COUNT) {
        player.targetLane = nl;
        player.laneTransition = 0;
      }
    }

    function jump() {
      if (!player.onGround || gameOver || !started || paused) return;
      // 滑铲状态下也可以起跳 - 自动结束滑铲
      if (player.isSliding) {
        player.isSliding = false;
        player.height = PLAYER_HEIGHT_NORMAL;
      }
      player.velocityY = JUMP_FORCE;
      player.onGround = false;
      createParticles(player.laneX, groundY, "#00f5ff", 6);
    }

    function slide() {
      if (!player.onGround || gameOver || !started || paused) return;
      if (player.isSliding) return;
      player.isSliding = true;
      player.height = PLAYER_HEIGHT_SLIDE;
      player.y = groundY - PLAYER_HEIGHT_SLIDE;
    }

    function endSlide() {
      if (!player.isSliding) return;
      player.isSliding = false;
      player.height = PLAYER_HEIGHT_NORMAL;
      player.y = groundY - PLAYER_HEIGHT_NORMAL;
    }

    // 滑铲状态 - 按住持续
    let slideHold = false;

    document.addEventListener("keydown", (e) => {
      switch (e.code) {
        case "ArrowLeft":
        case "KeyA":
          e.preventDefault();
          moveLane(-1);
          break;
        case "ArrowRight":
        case "KeyD":
          e.preventDefault();
          moveLane(1);
          break;
        case "Space":
        case "ArrowUp":
        case "KeyW":
          // W 键 / 空格 = 跳跃（按一下跳一下）
          e.preventDefault();
          if (!started || gameOver) { resetGame(); return; }
          jump();
          break;
        case "ArrowDown":
        case "KeyS":
          // S 键 = 滑铲（按住持续，松开停止）
          e.preventDefault();
          if (!slideHold) {
            slideHold = true;
            slide();
          }
          break;
        case "KeyR":
          if (gameOver) resetGame();
          break;
        case "Escape":
          if (started && !gameOver) paused = !paused;
          break;
      }
    });

    document.addEventListener("keyup", (e) => {
      if (e.code === "ArrowDown" || e.code === "KeyS") {
        slideHold = false;
        endSlide();
      }
    });

    // 触摸控制
    let touchStartX = 0, touchStartY = 0, touchActive = false;
    let touchSwipeAction = null; // 'jump' | 'slide' | null

    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      if (e.touches.length > 0) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchActive = true;
        touchSwipeAction = null;
      }
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      // 阻止页面滚动
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchend", (e) => {
      e.preventDefault();
      if (!touchActive) return;
      touchActive = false;
      const t = e.changedTouches[0];
      if (!t) return;
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
      if (!started || gameOver) { resetGame(); return; }
      if (Math.abs(dx) > Math.abs(dy)) {
        if (Math.abs(dx) > 30) moveLane(dx > 0 ? 1 : -1);
      } else {
        if (dy < -30) {
          // 向上滑 - 跳跃
          jump();
        } else if (dy > 30) {
          // 向下滑 - 滑铲（短暂）
          slide();
          setTimeout(() => endSlide(), 300);
        } else {
          // 点击 - 跳跃
          jump();
        }
      }
    }, { passive: false });

    // 鼠标控制 - 桌面端
    // 左键点击 = 跳跃
    // 右键按住 = 持续滑铲（松开停止）
    // 中键或右键单击 = 切换跑道
    let mouseSlideHold = false;
    canvas.addEventListener("mousedown", (e) => {
      if (!started || gameOver) return;
      if (e.button === 2) {
        // 右键 - 持续滑铲
        e.preventDefault();
        mouseSlideHold = true;
        slide();
      } else if (e.button === 1) {
        // 中键 - 切换到中间跑道
        e.preventDefault();
        if (player.targetLane !== 1) {
          player.targetLane = 1;
          player.laneTransition = 0;
        }
      } else if (e.button === 0) {
        // 左键 - 跳跃
        e.preventDefault();
        jump();
      }
    });

    canvas.addEventListener("mouseup", (e) => {
      if (e.button === 2 && mouseSlideHold) {
        mouseSlideHold = false;
        endSlide();
      }
    });

    canvas.addEventListener("mouseleave", () => {
      if (mouseSlideHold) {
        mouseSlideHold = false;
        endSlide();
      }
    });

    canvas.addEventListener("contextmenu", (e) => {
      e.preventDefault(); // 阻止右键菜单
    });

    // 当页面失焦时也释放滑铲
    window.addEventListener("blur", () => {
      slideHold = false;
      mouseSlideHold = false;
      endSlide();
    });

    canvas.addEventListener("click", (e) => {
      if (e.button !== 0) return; // 只响应左键
      // 获取 canvas 内坐标
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      // 在开始页或结束页时，先判断是否点中了难度按钮
      if (!started || gameOver) {
        const btns = getDifficultyButtons();
        for (const b of btns) {
          if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
            selectedDifficulty = b.key;
            return; // 点中按钮就不开始游戏
          }
        }
        resetGame();
      }
    });

    // ============================================================
    // 粒子
    // ============================================================
    function createParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 10,
          vy: (Math.random() - 0.5) * 8 - 3,
          life: 25 + Math.random() * 20,
          maxLife: 45,
          color,
          size: 2 + Math.random() * 4
        });
      }
    }

    // ============================================================
    // 障碍物
    // ============================================================
    function createObstacle() {
      const lane = Math.floor(Math.random() * LANE_COUNT);
      // 偏向栏杆（因为需要滑铲，少给一些）
      const type = Math.random() > 0.5 ? "railing" : "car";
      obstacles.push({
        lane,
        z: PERSPECTIVE_DEPTH + 50,
        type,
        width: type === "car" ? 60 : 70,
        height: type === "car" ? 45 : 30,
        hit: false
      });
    }

    function isColliding3D(obstacle) {
      if (obstacle.hit || obstacle.lane !== player.targetLane) return false;
      if (obstacle.z > 55 || obstacle.z < -10) return false;
      // 滑铲时只有栏杆可以穿过
      if (player.isSliding && obstacle.type === "railing") return false;
      // 跳跃到足够高度时所有障碍物都可以穿过
      if (!player.onGround && player.y < groundY - 80) return false;
      return Math.abs(obstacle.z) < 35;
    }

    // ============================================================
    // 游戏更新
    // ============================================================
    function update() {
      if (gameOver || !started || paused) return;
      frameCount++;

      // 玩家物理
      player.velocityY += GRAVITY;
      player.y += player.velocityY;
      if (player.y + player.height >= groundY) {
        player.y = groundY - player.height;
        player.velocityY = 0;
        player.onGround = true;
      }

      // 跑道切换动画
      player.laneTransition += LANE_SWITCH_SPEED;
      if (player.laneTransition >= 1) {
        player.laneTransition = 1;
        player.lane = player.targetLane;
      }
      const scale50 = projectFast(50).s;
      const startX = getLaneX(player.lane, scale50);
      const endX = getLaneX(player.targetLane, scale50);
      player.laneX = startX + (endX - startX) * player.laneTransition;
      player.x = player.laneX - player.width / 2;

      // 生成障碍物
      spawnTimer++;
      const spawnInterval = Math.max(30, 55 - Math.floor(speed) * 4);
      if (spawnTimer > spawnInterval + Math.random() * 25) {
        createObstacle();
        // 高速时偶尔双障碍
        if (speed > 3.5 && Math.random() > 0.65) createObstacle();
        spawnTimer = 0;
      }

      // 移动障碍物 + 过滤（性能：原地遍历避免创建新数组）
      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].z -= speed;
        if (obstacles[i].z < -80) {
          obstacles[i] = obstacles[obstacles.length - 1];
          obstacles.pop();
        }
      }

      // 碰撞检测
      for (let i = 0; i < obstacles.length; i++) {
        const o = obstacles[i];
        if (isColliding3D(o)) {
          o.hit = true;
          gameOver = true;
          shakeTimer = 15;
          shakeIntensity = 8;
          createParticles(player.x + player.width / 2, player.y + player.height / 2, "#ff0066", 30);
          const finalScore = Math.floor(scoreDisplay / 10);
          if (finalScore > highScore) {
            highScore = finalScore;
            try { localStorage.setItem("parkour3dHighScore", String(highScore)); } catch (e) {}
          }
          break;
        }
      }

      // 更新粒子（原地操作）
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2;
        p.life--;
        if (p.life <= 0) {
          particles[i] = particles[particles.length - 1];
          particles.pop();
        }
      }

      // 屏幕震动
      if (shakeTimer > 0) shakeTimer--;

      // 分数和速度
      score += speed * 0.5;
      // 平滑动画分数
      const target = score;
      scoreDisplay += (target - scoreDisplay) * 0.1;

      // 渐进式加速 2x -> 5x
      if (speed < maxSpeed) {
        if (score > 300) speed += 0.003;
        else if (score > 100) speed += 0.001;
        if (speed > maxSpeed) speed = maxSpeed;
      }
    }

    // ============================================================
    // 绘制 - 跑道
    // ============================================================
    function drawTrack() {
      // 天空渐变（每帧创建，因为需要适配窗口高度）
      const skyGrad = ctx.createLinearGradient(0, 0, 0, horizonY);
      skyGrad.addColorStop(0, "#0a0a1a");
      skyGrad.addColorStop(1, "#1a1a3a");
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, horizonY);

      // 星空 - 一次绘制所有
      ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
      for (let i = 0; i < STARS.length; i++) {
        const star = STARS[i];
        const sx = ((star.x + frameCount * 0.1) % W + W) % W;
        const sy = star.y % Math.max(1, horizonY - 20);
        ctx.beginPath();
        ctx.arc(sx, sy, star.r, 0, Math.PI * 2);
        ctx.fill();
      }

      // 远景建筑
      ctx.fillStyle = "#0f0f2a";
      for (let i = 0; i < BUILDINGS.length; i++) {
        const b = BUILDINGS[i];
        const bx = ((b.x - frameCount * 0.2) % (W + 60) - 30 + W + 60) % (W + 60) - 30;
        const by = horizonY - b.h;
        ctx.fillRect(bx, by, 35, b.h);
        // 窗户（批量绘制）
        ctx.fillStyle = "rgba(0, 245, 255, 0.1)";
        for (let wy = by + 6; wy < horizonY - 5; wy += 14) {
          ctx.fillRect(bx + 5, wy, 4, 6);
          ctx.fillRect(bx + 20, wy, 4, 6);
        }
        ctx.fillStyle = "#0f0f2a";
      }

      // 地面
      const groundGrad = ctx.createLinearGradient(0, horizonY, 0, H);
      groundGrad.addColorStop(0, "#0a0a1a");
      groundGrad.addColorStop(1, "#1a1a3a");
      ctx.fillStyle = groundGrad;
      ctx.fillRect(0, horizonY, W, H - horizonY);

      // 跑道
      const farScale = 0.05;
      const nearHalfW = LANE_WIDTH / 2;
      const farHalfW = LANE_WIDTH * farScale / 2;

      for (let lane = 0; lane < LANE_COUNT; lane++) {
        const laneOffset = (lane - 1) * (LANE_WIDTH + LANE_GAP);
        const nearX = vanishX + laneOffset;
        const farX = vanishX + laneOffset * farScale;

        // 跑道面
        ctx.fillStyle = "rgba(255, 255, 255, 0.12)";
        ctx.beginPath();
        ctx.moveTo(farX - farHalfW, horizonY);
        ctx.lineTo(nearX - nearHalfW, groundY);
        ctx.lineTo(nearX + nearHalfW, groundY);
        ctx.lineTo(farX + farHalfW, horizonY);
        ctx.closePath();
        ctx.fill();

        // 跑道边框
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.moveTo(farX - farHalfW, horizonY);
        ctx.lineTo(nearX - nearHalfW, groundY);
        ctx.moveTo(farX + farHalfW, horizonY);
        ctx.lineTo(nearX + nearHalfW, groundY);
        ctx.stroke();

        // 跑道横线（速度感）
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        const speedMul = speed * 3;
        for (let i = 0; i < TRACK_LINES.length; i++) {
          const z = (frameCount * speedMul + TRACK_LINES[i]) % PERSPECTIVE_DEPTH;
          const proj = projectFast(z);
          if (proj.s < 0.05) continue;
          const lineX = vanishX + laneOffset * proj.s;
          const lw = LANE_WIDTH * proj.s;
          ctx.moveTo(lineX - lw / 2, proj.y);
          ctx.lineTo(lineX + lw / 2, proj.y);
        }
        ctx.stroke();
      }

      // 跑道间隔
      const farGapHalf = LANE_GAP * farScale / 2;
      const gapHalfW = LANE_GAP / 2;
      ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
      for (let i = 0; i < LANE_COUNT - 1; i++) {
        const idx = i;
        const laneOffset = (idx - 0.5) * (LANE_WIDTH + LANE_GAP) + LANE_WIDTH;
        const nearX = vanishX + laneOffset;
        const farX = vanishX + laneOffset * farScale;

        ctx.beginPath();
        ctx.moveTo(farX - farGapHalf, horizonY);
        ctx.lineTo(nearX - gapHalfW, groundY);
        ctx.lineTo(nearX + gapHalfW, groundY);
        ctx.lineTo(farX + farGapHalf, horizonY);
        ctx.closePath();
        ctx.fill();

        // 蓝色分割线
        ctx.strokeStyle = "rgba(0, 245, 255, 0.5)";
        ctx.lineWidth = 2;
        ctx.shadowColor = "#00f5ff";
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.moveTo(farX, horizonY);
        ctx.lineTo(nearX, groundY);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }

    // ============================================================
    // 绘制 - 火柴人（背面视角）
    // ============================================================
    function drawStickman(x, y, w, h, isSliding, runFrame) {
      ctx.save();
      const cx = x + w / 2;
      const color = isSliding ? "#ff00aa" : "#00f5ff";
      ctx.strokeStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      if (isSliding) {
        // 滑铲姿势
        const headY = y + h - 15;
        const bodyY = y + h - 5;
        ctx.beginPath();
        ctx.arc(cx, headY, 5, 0, Math.PI * 2);
        ctx.moveTo(cx, headY + 5);
        ctx.lineTo(cx, bodyY);
        ctx.moveTo(cx, bodyY);
        ctx.lineTo(cx + 15, bodyY + 5);
        ctx.moveTo(cx, bodyY);
        ctx.lineTo(cx - 8, bodyY + 5);
        ctx.stroke();
      } else {
        // 跑步姿势
        const phase = runFrame * 0.35;
        const headY = y + PLAYER_HEAD_OFFSET;
        const bodyTopY = y + 15;
        const bodyBotY = y + h - 18;
        const legSwing = Math.sin(phase) * 10;
        const armSwing = Math.sin(phase + Math.PI) * 7;

        // 合并为一条 path 减少状态切换
        ctx.beginPath();
        ctx.arc(cx, headY, 7, 0, Math.PI * 2);
        ctx.moveTo(cx, bodyTopY);
        ctx.lineTo(cx, bodyBotY);
        // 腿
        ctx.moveTo(cx, bodyBotY);
        ctx.lineTo(cx - legSwing, y + h);
        ctx.moveTo(cx, bodyBotY);
        ctx.lineTo(cx + legSwing, y + h);
        // 手臂
        ctx.moveTo(cx, bodyTopY + 3);
        ctx.lineTo(cx - armSwing - 3, bodyTopY + 16);
        ctx.moveTo(cx, bodyTopY + 3);
        ctx.lineTo(cx + armSwing + 3, bodyTopY + 16);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // ============================================================
    // 绘制 - 障碍物
    // ============================================================
    function drawObstacle(o) {
      const proj = projectFast(o.z);
      if (proj.s < 0.02) return;
      const ox = getLaneX(o.lane, proj.s);
      const ow = o.width * proj.s;
      const oh = o.height * proj.s;
      const drawX = ox - ow / 2;
      const drawY = proj.y - oh;
      const blur = proj.s * 15;

      ctx.save();
      if (o.type === "railing") {
        ctx.fillStyle = "#ff6600";
        ctx.shadowColor = "#ff6600";
        ctx.shadowBlur = blur;
        // 合并为一条 path
        ctx.beginPath();
        ctx.rect(drawX, drawY, ow, oh * 0.3);
        const pillarW = Math.max(1, ow * 0.08);
        ctx.rect(drawX, drawY, pillarW, oh);
        ctx.rect(drawX + ow - pillarW, drawY, pillarW, oh);
        ctx.fill();

        // 警告条纹
        ctx.fillStyle = "#0a0a1a";
        const stripeH = Math.max(2, 6 * proj.s);
        const stripeGap = Math.max(3, 6 * proj.s);
        const innerW = ow - pillarW * 2;
        for (let i = 0; i < oh * 0.3; i += stripeGap) {
          ctx.fillRect(drawX + pillarW, drawY + i, innerW, Math.min(stripeH, oh * 0.3 - i));
        }
      } else {
        // 小汽车
        ctx.fillStyle = "#ff0044";
        ctx.shadowColor = "#ff0044";
        ctx.shadowBlur = blur;
        const carBodyH = oh * 0.6;
        const carTopH = oh * 0.35;
        const carTopW = ow * 0.6;
        const topOffsetX = (ow - carTopW) / 2;

        // 合并绘制车体
        ctx.beginPath();
        ctx.rect(drawX, drawY + oh * 0.35, ow, carBodyH);
        ctx.rect(drawX + topOffsetX, drawY, carTopW, carTopH);
        ctx.fill();

        // 车窗
        ctx.fillStyle = "#0a0a1a";
        ctx.fillRect(drawX + topOffsetX + 4 * proj.s, drawY + 3 * proj.s, carTopW - 8 * proj.s, carTopH - 6 * proj.s);

        // 车轮
        ctx.fillStyle = "#333333";
        const wheelR = ow * 0.12;
        ctx.beginPath();
        ctx.arc(drawX + ow * 0.25, drawY + oh, wheelR, 0, Math.PI * 2);
        ctx.arc(drawX + ow * 0.75, drawY + oh, wheelR, 0, Math.PI * 2);
        ctx.fill();

        // 尾灯
        ctx.fillStyle = "#ffdd00";
        ctx.fillRect(drawX, drawY + oh * 0.4, ow * 0.1, oh * 0.15);
        ctx.fillRect(drawX + ow * 0.9, drawY + oh * 0.4, ow * 0.1, oh * 0.15);
      }
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // ============================================================
    // 绘制 - 粒子
    // ============================================================
    function drawParticles() {
      if (particles.length === 0) return;
      ctx.save();
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        const alpha = p.life / p.maxLife;
        if (alpha <= 0) continue;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // ============================================================
    // 绘制 - HUD
    // ============================================================
    function drawHUD() {
      // 分数
      ctx.fillStyle = "#00f5ff";
      ctx.font = "bold 24px Arial";
      ctx.textAlign = "left";
      ctx.shadowColor = "#00f5ff";
      ctx.shadowBlur = 8;
      ctx.fillText("分数: " + Math.floor(scoreDisplay / 10), 15, 35);
      ctx.shadowBlur = 0;

      // 速度
      ctx.fillStyle = "#ff00aa";
      ctx.font = "16px Arial";
      ctx.textAlign = "right";
      ctx.fillText("速度: " + speed.toFixed(1) + "x", W - 15, 35);

      if (paused) {
        ctx.fillStyle = "rgba(10, 10, 26, 0.7)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#00f5ff";
        ctx.font = "bold 36px Arial";
        ctx.textAlign = "center";
        ctx.shadowColor = "#00f5ff";
        ctx.shadowBlur = 20;
        ctx.fillText("已暂停", W / 2, H / 2 - 10);
        ctx.font = "16px Arial";
        ctx.fillStyle = "#6b7280";
        ctx.shadowBlur = 0;
        ctx.fillText("按 ESC 继续", W / 2, H / 2 + 20);
      }
    }

    // ============================================================
    // 绘制 - 开始/结束界面
    // ============================================================

    // 难度按钮的位置（在 start 和 gameOver 屏幕中复用）
    function getDifficultyButtons() {
      const labels = ["easy", "normal", "hard"];
      const btnW = 90, btnH = 36, gap = 14;
      const totalW = btnW * 3 + gap * 2;
      const startX = (W - totalW) / 2;
      const y = H / 2 + 30;
      return labels.map((key, i) => ({
        key,
        x: startX + i * (btnW + gap),
        y,
        w: btnW,
        h: btnH,
        ...DIFFICULTIES[key]
      }));
    }

    function drawDifficultyButtons(active) {
      const btns = getDifficultyButtons();
      for (const b of btns) {
        const isActive = b.key === active;
        ctx.save();
        // 背景
        ctx.fillStyle = isActive ? b.color : "rgba(255, 255, 255, 0.06)";
        ctx.shadowColor = isActive ? b.color : "transparent";
        ctx.shadowBlur = isActive ? 12 : 0;
        roundRect(ctx, b.x, b.y, b.w, b.h, 8);
        ctx.fill();
        ctx.shadowBlur = 0;
        // 边框
        ctx.strokeStyle = isActive ? b.color : "rgba(255, 255, 255, 0.2)";
        ctx.lineWidth = isActive ? 2 : 1;
        roundRect(ctx, b.x, b.y, b.w, b.h, 8);
        ctx.stroke();
        // 文字
        ctx.fillStyle = isActive ? "#0a0a1a" : "#9ca3af";
        ctx.font = "bold 14px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(b.name, b.x + b.w / 2, b.y + b.h / 2);
        ctx.restore();
      }
      ctx.textBaseline = "alphabetic";
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawStartScreen() {
      ctx.fillStyle = "rgba(10, 10, 26, 0.9)";
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "#00f5ff";
      ctx.font = "bold 48px Arial";
      ctx.textAlign = "center";
      ctx.shadowColor = "#00f5ff";
      ctx.shadowBlur = 30;
      ctx.fillText("霓虹跑酷", W / 2, H / 2 - 130);
      ctx.shadowBlur = 0;

      ctx.fillStyle = "#ff00aa";
      ctx.font = "18px Arial";
      ctx.fillText("NEON PARKOUR 3D", W / 2, H / 2 - 95);

      // 难度标签
      ctx.fillStyle = "#9ca3af";
      ctx.font = "14px Arial";
      ctx.fillText("选择难度", W / 2, H / 2 - 55);

      // 难度按钮
      drawDifficultyButtons(selectedDifficulty);

      // 难度说明
      const d = getDifficulty();
      ctx.fillStyle = d.color;
      ctx.font = "13px Arial";
      ctx.shadowColor = d.color;
      ctx.shadowBlur = 6;
      ctx.fillText(d.name + "模式: " + d.startSpeed + "x → " + d.maxSpeed + "x 速度", W / 2, H / 2 + 80);
      ctx.shadowBlur = 0;

      // 操作提示
      ctx.fillStyle = "#9ca3af";
      ctx.font = "13px Arial";
      ctx.fillText("← → 切换跑道  |  W/空格 跳跃  |  S/鼠标右键 滑铲(按住)", W / 2, H / 2 + 115);
      ctx.fillText("ESC 暂停  |  手机：滑动控制", W / 2, H / 2 + 138);

      ctx.fillStyle = "#6b7280";
      ctx.font = "16px Arial";
      ctx.fillText("点击屏幕 或 按空格键开始", W / 2, H / 2 + 170);

      ctx.fillStyle = "#8b5cf6";
      ctx.font = "18px Arial";
      ctx.shadowColor = "#8b5cf6";
      ctx.shadowBlur = 10;
      ctx.fillText("最高分: " + highScore, W / 2, H / 2 + 205);
      ctx.shadowBlur = 0;
    }

    function drawGameOver() {
      if (!gameOver) return;
      ctx.fillStyle = "rgba(10, 10, 26, 0.85)";
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "#ff0066";
      ctx.font = "bold 42px Arial";
      ctx.textAlign = "center";
      ctx.shadowColor = "#ff0066";
      ctx.shadowBlur = 20;
      ctx.fillText("游戏结束", W / 2, H / 2 - 120);
      ctx.shadowBlur = 0;

      ctx.fillStyle = "#00f5ff";
      ctx.font = "bold 28px Arial";
      ctx.fillText("得分: " + Math.floor(scoreDisplay / 10), W / 2, H / 2 - 70);

      ctx.fillStyle = "#8b5cf6";
      ctx.font = "18px Arial";
      ctx.fillText("最高分: " + highScore, W / 2, H / 2 - 35);

      if (Math.floor(scoreDisplay / 10) >= highScore && highScore > 0) {
        ctx.fillStyle = "#ffdd00";
        ctx.font = "16px Arial";
        ctx.fillText("🎉 新纪录！", W / 2, H / 2 - 10);
      }

      // 难度选择（可在结束界面切换）
      ctx.fillStyle = "#9ca3af";
      ctx.font = "13px Arial";
      ctx.fillText("选择难度", W / 2, H / 2 + 10);
      drawDifficultyButtons(selectedDifficulty);

      ctx.fillStyle = "#6b7280";
      ctx.font = "14px Arial";
      ctx.fillText("点击屏幕 或 按 R 重新开始", W / 2, H / 2 + 95);
    }

    // ============================================================
    // 主绘制
    // ============================================================
    function draw() {
      // 用 fillRect 替代 clearRect（更稳定，避免 alpha 闪烁）
      ctx.fillStyle = "#0a0a1a";
      ctx.fillRect(0, 0, W, H);

      if (shakeTimer > 0) {
        ctx.save();
        const k = shakeTimer / 15;
        ctx.translate(
          (Math.random() - 0.5) * shakeIntensity * k,
          (Math.random() - 0.5) * shakeIntensity * k
        );
      }

      drawTrack();

      if (started) {
        // 障碍物（已按 z 倒序在创建时维护，这里按插入顺序绘制天然就是远的先画）
        for (let i = 0; i < obstacles.length; i++) {
          drawObstacle(obstacles[i]);
        }
        drawStickman(
          player.x, player.y, player.width, player.height,
          player.isSliding, frameCount
        );
        drawParticles();
        drawHUD();
        drawGameOver();
      } else {
        drawStartScreen();
      }

      if (shakeTimer > 0) ctx.restore();
    }

    // ============================================================
    // 主循环
    // ============================================================
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // ============================================================
    // 初始化
    // ============================================================
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    started = false;
    gameOver = true;
    frameCount = 0;
    score = 0;
    scoreDisplay = 0;
    const initDiff = getDifficulty();
    speed = initDiff.startSpeed;
    maxSpeed = initDiff.maxSpeed;
    obstacles = [];
    particles = [];
    player = {
      lane: 1, targetLane: 1,
      x: vanishX - PLAYER_WIDTH / 2, y: groundY - PLAYER_HEIGHT_NORMAL,
      width: PLAYER_WIDTH, height: PLAYER_HEIGHT_NORMAL,
      velocityY: 0, onGround: true,
      isSliding: false, slideTimer: 0,
      laneX: vanishX, laneTransition: 1
    };
    gameLoop();
  </script>
</body>
</html>
