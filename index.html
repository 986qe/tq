<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>霓虹跑酷 - 地铁跑酷风格</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    .tip {
      position: absolute;
      bottom: 12px;
      left: 0; right: 0;
      text-align: center;
      color: #6b7280;
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <canvas id="game"></canvas>
    <p class="tip">← → 跑道 | W/空格 跳跃 | S/鼠标右键 滑铲(按住) | ESC 暂停 | 手机：滑动控制 + 屏幕按钮</p>
  </div>

  <script>
    "use strict";

    // ============================================================
    // 设备检测（性能分级）
    // ============================================================
    const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ||
                     (navigator.maxTouchPoints > 0 && window.innerWidth < 1024);
    const isLowPerf = isMobile; // 移动端视为低性能设备
    // 移动端内部渲染分辨率（降低像素数 = 大幅提升性能）
    const MOBILE_RENDER_SCALE = isLowPerf ? 0.5 : 1.0;

    const dpr = isLowPerf ? MOBILE_RENDER_SCALE : Math.min(window.devicePixelRatio || 1, 2);

    // ============================================================
    // Canvas 初始化 + 高分屏适配
    // ============================================================
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d", { alpha: false });
    let W = 0, H = 0;
    let groundY = 0, horizonY = 0, vanishX = 0;

    function resizeCanvas() {
      const container = canvas.parentElement;
      W = container.clientWidth;
      H = container.clientHeight;
      canvas.width = Math.max(1, Math.floor(W * dpr));
      canvas.height = Math.max(1, Math.floor(H * dpr));
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      // 更新派生量
      groundY = H * GROUND_Y_RATIO;
      horizonY = H * HORIZON_Y_RATIO;
      vanishX = W * 0.5;
      // 重建预渲染轨道
      buildTrackCache();
    }

    // ============================================================
    // 游戏参数
    // ============================================================
    const LANE_COUNT = 3;
    const LANE_WIDTH = 130;
    const LANE_GAP = 40;
    const GROUND_Y_RATIO = 0.90;
    const HORIZON_Y_RATIO = 0.25;
    const PERSPECTIVE_DEPTH = 800;
    const PLAYER_HEIGHT_NORMAL = 95;
    const PLAYER_HEIGHT_SLIDE = 42;
    const PLAYER_WIDTH = 75;
    const PLAYER_HEAD_OFFSET = 10; // 头到 y 的偏移
    const GRAVITY = 0.8;
    const JUMP_FORCE = -20;
    const LANE_SWITCH_SPEED = 0.12;

    // 星空
    const STARS = (() => {
      const arr = [];
      const n = isLowPerf ? 30 : 40;
      for (let i = 0; i < n; i++) {
        arr.push({ x: Math.random() * 1000, y: Math.random() * 200, r: 1 + (i % 3) });
      }
      return arr;
    })();

    // 远景建筑（预生成）
    const BUILDINGS = (() => {
      const arr = [];
      const n = isLowPerf ? 10 : 12;
      for (let i = 0; i < n; i++) {
        arr.push({ x: i * 80, h: 40 + (i * 43) % 80 });
      }
      return arr;
    })();

    // 跑道上的横线 z 偏移（预生成）
    const TRACK_LINES = (() => {
      const arr = [];
      const n = isLowPerf ? 15 : 20;
      for (let i = 0; i < n; i++) arr.push(i * 40);
      return arr;
    })();

    // 粒子上限（防止爆炸性增长）
    const MAX_PARTICLES = isLowPerf ? 50 : 80;

    // ============================================================
    // 难度模式
    // ============================================================
    const DIFFICULTIES = {
      easy:     { name: "简单", startSpeed: 2,  maxSpeed: 5,  color: "#22d3ee", density: 1.0  },
      normal:   { name: "普通", startSpeed: 4,  maxSpeed: 8,  color: "#ff00aa", density: 1.0  },
      hard:     { name: "困难", startSpeed: 5,  maxSpeed: 10, color: "#ff0044", density: 1.0  },
      extreme:  { name: "极限", startSpeed: 10, maxSpeed: 20, color: "#ff00ff", density: 1.2  },
      ultimate: { name: "终极", startSpeed: 15, maxSpeed: 30, color: "#ff2200", density: 1.6  }
    };
    let selectedDifficulty = "easy"; // 默认简单模式
    function getDifficulty() { return DIFFICULTIES[selectedDifficulty]; }

    // ============================================================
    // 角色选择
    // ============================================================
    const CHARACTERS = {
      stickman: { name: "火柴人", color: "#00f5ff" },
      dog:      { name: "狗头梗", color: "#ffaa44" }
    };
    let selectedCharacter = "stickman";
    function getCharacter() { return CHARACTERS[selectedCharacter]; }

    // ============================================================
    // 游戏状态
    // ============================================================
    let player, obstacles, particles, score, speed, maxSpeed, gameOver, started;
    let spawnTimer, frameCount, highScore, scoreDisplay;
    let shakeTimer = 0, shakeIntensity = 0;
    let paused = false;

    // 按钮弹跳状态 { key, t }：t 从 0 增长到 1，按 1.5x -> 1.0x 缩放
    let buttonBounce = null;

    // ============================================================
    // 音效（Web Audio API）
    // ============================================================
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) { audioCtx = null; }
      }
      // 部分浏览器在创建时处于 suspended 状态
      if (audioCtx && audioCtx.state === "suspended") {
        audioCtx.resume().catch(() => {});
      }
      return audioCtx;
    }
    function playClick(freq) {
      const ac = ensureAudio();
      if (!ac) return;
      const f = freq || 620;
      const t = ac.currentTime;
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(f, t);
      osc.frequency.exponentialRampToValueAtTime(f * 0.5, t + 0.09);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.35, t + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(t);
      osc.stop(t + 0.14);
    }

    try {
      highScore = parseInt(localStorage.getItem("parkour3dHighScore") || "0") || 0;
    } catch (e) {
      highScore = 0;
    }
    scoreDisplay = 0;

    // ============================================================
    // 重置游戏
    // ============================================================
    function resetGame() {
      player = {
        lane: 1,
        targetLane: 1,
        x: vanishX - PLAYER_WIDTH / 2,
        y: groundY - PLAYER_HEIGHT_NORMAL,
        width: PLAYER_WIDTH,
        height: PLAYER_HEIGHT_NORMAL,
        velocityY: 0,
        onGround: true,
        isSliding: false,
        slideTimer: 0,
        laneX: vanishX,
        laneTransition: 1
      };
      obstacles = [];
      particles = [];
      score = 0;
      scoreDisplay = 0;
      const diff = getDifficulty();
      speed = diff.startSpeed;
      maxSpeed = diff.maxSpeed;
      gameOver = false;
      started = true;
      paused = false;
      spawnTimer = 0;
      frameCount = 0;
      shakeTimer = 0;
      // 重置滑铲状态，避免重新开始游戏时仍处于滑铲中
      slideHold = false;
      mouseSlideHold = false;
    }

    // 返回主菜单（开始页）
    function backToMenu() {
      started = false;
      gameOver = true;
      paused = false;
      slideHold = false;
      mouseSlideHold = false;
      // 清理障碍/粒子
      obstacles = [];
      particles = [];
      endSlide();
    }

    // 退出游戏
    function quitGame() {
      // 浏览器安全策略一般不允许脚本关闭当前标签页
      // 先尝试关闭，失败则提示用户手动关闭
      try {
        window.open('', '_self').close();
      } catch (e) {}
      setTimeout(() => {
        // 提示用户手动关闭
        document.body.innerHTML = '<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0a1a;color:#00f5ff;font-family:Arial,sans-serif;font-size:24px;text-align:center;padding:40px;">请关闭此浏览器标签页退出游戏</div>';
      }, 50);
    }

    // ============================================================
    // 透视投影（内联优化版本）
    // ============================================================
    const diffGround = 0; // 占位，groundY - horizonY
    function projectFast(z) {
      const ratio = 1 - z / PERSPECTIVE_DEPTH;
      const ratioPow = Math.pow(ratio, 1.5);
      return {
        y: horizonY + (groundY - horizonY) * Math.pow(ratio, 1.8),
        s: ratioPow
      };
    }

    // 获取某条跑道在某个 z 位置的 x 中心（仅返回必要字段）
    function getLaneX(lane, scale) {
      return vanishX + (lane - 1) * (LANE_WIDTH + LANE_GAP) * scale;
    }

    // ============================================================
    // 输入
    // ============================================================
    function moveLane(dir) {
      if (gameOver || !started || paused) return;
      const nl = player.targetLane + dir;
      if (nl >= 0 && nl < LANE_COUNT) {
        player.targetLane = nl;
        player.laneTransition = 0;
      }
    }

    function jump() {
      if (!player.onGround || gameOver || !started || paused) return;
      // 滑铲状态下也可以起跳 - 自动结束滑铲
      if (player.isSliding) {
        player.isSliding = false;
        player.height = PLAYER_HEIGHT_NORMAL;
      }
      player.velocityY = JUMP_FORCE;
      player.onGround = false;
      createParticles(player.laneX, groundY, "#00f5ff", isLowPerf ? 3 : 6);
    }

    function slide() {
      if (!player.onGround || gameOver || !started || paused) return;
      if (player.isSliding) return;
      player.isSliding = true;
      player.height = PLAYER_HEIGHT_SLIDE;
      player.y = groundY - PLAYER_HEIGHT_SLIDE;
    }

    function endSlide() {
      if (!player.isSliding) return;
      player.isSliding = false;
      player.height = PLAYER_HEIGHT_NORMAL;
      player.y = groundY - PLAYER_HEIGHT_NORMAL;
    }

    // 滑铲状态 - 按住持续
    let slideHold = false;

    document.addEventListener("keydown", (e) => {
      switch (e.code) {
        case "ArrowLeft":
        case "KeyA":
          e.preventDefault();
          moveLane(-1);
          break;
        case "ArrowRight":
        case "KeyD":
          e.preventDefault();
          moveLane(1);
          break;
        case "Space":
        case "ArrowUp":
        case "KeyW":
          // W 键 / 空格 = 跳跃（按一下跳一下）
          e.preventDefault();
          if (!started || gameOver) { resetGame(); return; }
          jump();
          break;
        case "ArrowDown":
        case "KeyS":
          // S 键 = 滑铲（按住持续，松开停止）
          e.preventDefault();
          if (!slideHold) {
            slideHold = true;
            slide();
          }
          break;
        case "KeyR":
          if (gameOver) resetGame();
          break;
        case "Escape":
          if (started && !gameOver) {
            paused = !paused;
            // 暂停/继续用不同音高提示
            playClick(paused ? 320 : 780);
          }
          break;
      }
    });

    document.addEventListener("keyup", (e) => {
      if (e.code === "ArrowDown" || e.code === "KeyS") {
        slideHold = false;
        endSlide();
      }
    });

    // 触摸控制
    let touchStartX = 0, touchStartY = 0, touchActive = false;
    let touchSwipeAction = null; // 'jump' | 'slide' | null

    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      if (e.touches.length > 0) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchActive = true;
        touchSwipeAction = null;
      }
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
      // 阻止页面滚动
      e.preventDefault();
    }, { passive: false });

    // 触摸意外中断（来电/滑出屏幕）时清理状态
    canvas.addEventListener("touchcancel", (e) => {
      touchActive = false;
      slideHold = false;
      endSlide();
    }, { passive: false });

    canvas.addEventListener("touchend", (e) => {
      e.preventDefault();
      if (!touchActive) return;
      touchActive = false;
      const t = e.changedTouches[0];
      if (!t) return;
      // 转换为 canvas 内坐标
      const rect = canvas.getBoundingClientRect();
      const cx = t.clientX - rect.left;
      const cy = t.clientY - rect.top;
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;

      // ============ UI 按钮处理（与桌面端完全同步）============
      // 暂停菜单按钮
      if (paused) {
        const btns = getPauseMenuButtons();
        for (const b of btns) {
          if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
            buttonBounce = { key: b.key, t: 0 };
            playClick(620);
            if (b.key === "continue") {
              paused = false;
              playClick(780);
            } else if (b.key === "menu") {
              backToMenu();
            } else if (b.key === "quit") {
              quitGame();
            }
            return;
          }
        }
        // 点击菜单空白区域继续
        paused = false;
        playClick(780);
        return;
      }

      // 开始页/结束页：先判断开始/重新开始按钮
      if (!started || gameOver) {
        // 大厅：开始游戏按钮
        if (!started) {
          const sb = getStartButton();
          if (cx >= sb.x && cx <= sb.x + sb.w && cy >= sb.y && cy <= sb.y + sb.h) {
            buttonBounce = { key: sb.key, t: 0 };
            playClick(580);
            resetGame();
            return;
          }
        }
        // 结束页：重新开始按钮
        if (gameOver) {
          const rb = getRestartButton();
          if (cx >= rb.x && cx <= rb.x + rb.w && cy >= rb.y && cy <= rb.y + rb.h) {
            buttonBounce = { key: rb.key, t: 0 };
            playClick(580);
            resetGame();
            return;
          }
        }
        const btns = getDifficultyButtons();
        for (const b of btns) {
          if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
            selectedDifficulty = b.key;
            buttonBounce = { key: b.key, t: 0 };
            playClick(620);
            return;
          }
        }
        // 角色按钮
        const cBtns = getCharacterButtons();
        for (const b of cBtns) {
          if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
            selectedCharacter = b.key;
            buttonBounce = { key: "char_" + b.key, t: 0 };
            playClick(720);
            return;
          }
        }
        // 结束页：点击空白处重新开始
        if (gameOver) {
          playClick(420);
          resetGame();
        }
        return;
      }

      // 游戏中：返回大厅按钮（轻触）
      const bb = getBackButton();
      if (Math.abs(dx) < 15 && Math.abs(dy) < 15 &&
          cx >= bb.x && cx <= bb.x + bb.w && cy >= bb.y && cy <= bb.y + bb.h) {
        buttonBounce = { key: bb.key, t: 0 };
        playClick(520);
        backToMenu();
        return;
      }

      // 游戏中：暂停按钮（轻触）
      const pb = getPauseButton();
      if (Math.abs(dx) < 15 && Math.abs(dy) < 15 &&
          cx >= pb.x && cx <= pb.x + pb.w && cy >= pb.y && cy <= pb.y + pb.h) {
        buttonBounce = { key: pb.key, t: 0 };
        paused = true;
        playClick(320);
        return;
      }

      // ============ 游戏控制（同步桌面端）============
      // 水平滑动 = 切换跑道
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
        moveLane(dx > 0 ? 1 : -1);
        return;
      }
      // 垂直方向
      if (dy < -30) {
        // 上滑 = 跳跃（jump 函数会自动结束滑铲）
        jump();
      } else if (dy > 30) {
        // 下滑 = 开始滑铲（持续到下次跳跃/动作）
        slide();
      } else {
        // 轻触 = 跳跃
        jump();
      }
    }, { passive: false });

    // 鼠标控制 - 桌面端
    // 左键点击 = 跳跃
    // 右键按住 = 持续滑铲（松开停止）
    // 中键或右键单击 = 切换跑道
    let mouseSlideHold = false;
    canvas.addEventListener("mousedown", (e) => {
      if (!started || gameOver) return;
      if (e.button === 2) {
        // 右键 - 持续滑铲
        e.preventDefault();
        mouseSlideHold = true;
        slide();
      } else if (e.button === 1) {
        // 中键 - 切换到中间跑道
        e.preventDefault();
        if (player.targetLane !== 1) {
          player.targetLane = 1;
          player.laneTransition = 0;
        }
      } else if (e.button === 0) {
        // 左键 - 跳跃
        e.preventDefault();
        jump();
      }
    });

    canvas.addEventListener("mouseup", (e) => {
      if (e.button === 2 && mouseSlideHold) {
        mouseSlideHold = false;
        endSlide();
      }
    });

    canvas.addEventListener("mouseleave", () => {
      if (mouseSlideHold) {
        mouseSlideHold = false;
        endSlide();
      }
    });

    canvas.addEventListener("contextmenu", (e) => {
      e.preventDefault(); // 阻止右键菜单
    });

    // 当页面失焦时也释放滑铲
    window.addEventListener("blur", () => {
      slideHold = false;
      mouseSlideHold = false;
      endSlide();
    });

    canvas.addEventListener("click", (e) => {
      if (e.button !== 0) return; // 只响应左键
      // 获取 canvas 内坐标
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      // 游戏中返回大厅按钮（左上角）
      if (started && !gameOver && !paused) {
        const bb = getBackButton();
        if (x >= bb.x && x <= bb.x + bb.w && y >= bb.y && y <= bb.y + bb.h) {
          buttonBounce = { key: bb.key, t: 0 };
          playClick(520);
          backToMenu();
          return;
        }
        // 暂停按钮（右上角）
        const pb = getPauseButton();
        if (x >= pb.x && x <= pb.x + pb.w && y >= pb.y && y <= pb.y + pb.h) {
          buttonBounce = { key: pb.key, t: 0 };
          paused = true;
          playClick(320);
          return;
        }
      }

      // 暂停菜单点击处理
      if (paused) {
        const btns = getPauseMenuButtons();
        for (const b of btns) {
          if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
            buttonBounce = { key: b.key, t: 0 };
            playClick(620);
            if (b.key === "continue") {
              paused = false;
              playClick(780);
            } else if (b.key === "menu") {
              backToMenu();
            } else if (b.key === "quit") {
              quitGame();
            }
            return;
          }
        }
        // 点击菜单空白区域也可继续
        paused = false;
        playClick(780);
        return;
      }

      // 在开始页或结束页时，先判断是否点中了难度按钮
      if (!started || gameOver) {
        // 大厅：开始游戏按钮
        if (!started) {
          const sb = getStartButton();
          if (x >= sb.x && x <= sb.x + sb.w && y >= sb.y && y <= sb.y + sb.h) {
            buttonBounce = { key: sb.key, t: 0 };
            playClick(580);
            resetGame();
            return;
          }
        }
        // 结束页：重新开始按钮
        if (gameOver) {
          const rb = getRestartButton();
          if (x >= rb.x && x <= rb.x + rb.w && y >= rb.y && y <= rb.y + rb.h) {
            buttonBounce = { key: rb.key, t: 0 };
            playClick(580);
            resetGame();
            return;
          }
        }
        // 难度按钮
        const btns = getDifficultyButtons();
        for (const b of btns) {
          if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
            selectedDifficulty = b.key;
            // 触发弹跳动画 + 播放音效
            buttonBounce = { key: b.key, t: 0 };
            playClick(620);
            return; // 点中按钮就不开始游戏
          }
        }
        // 角色按钮
        const cBtns = getCharacterButtons();
        for (const b of cBtns) {
          if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
            selectedCharacter = b.key;
            buttonBounce = { key: "char_" + b.key, t: 0 };
            playClick(720);
            return;
          }
        }
        // 空白处：结束页可点空白重开；大厅不响应
        if (gameOver) {
          playClick(420);
          resetGame();
        }
      } else {
        playClick(500);
      }
    });

    // ============================================================
    // 粒子
    // ============================================================
    function createParticles(x, y, color, count) {
      // 限制总粒子数 + 移动端单次生成更少
      const max = MAX_PARTICLES - particles.length;
      const n = Math.min(count, Math.max(0, max));
      for (let i = 0; i < n; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 10,
          vy: (Math.random() - 0.5) * 8 - 3,
          life: 25 + Math.random() * 20,
          maxLife: 45,
          color,
          size: 2 + Math.random() * 4
        });
      }
    }

    // ============================================================
    // 障碍物
    // ============================================================
    function createObstacle() {
      const lane = Math.floor(Math.random() * LANE_COUNT);
      // 偏向栏杆（因为需要滑铲，少给一些）
      const type = Math.random() > 0.5 ? "railing" : "car";
      obstacles.push({
        lane,
        z: PERSPECTIVE_DEPTH + 50,
        type,
        width: type === "car" ? 90 : 105,
        height: type === "car" ? 65 : 45,
        hit: false
      });
    }

    function isColliding3D(obstacle) {
      if (obstacle.hit || obstacle.lane !== player.targetLane) return false;
      if (obstacle.z > 55 || obstacle.z < -10) return false;
      // 滑铲时只有栏杆可以穿过
      if (player.isSliding && obstacle.type === "railing") return false;
      // 跳跃到足够高度时所有障碍物都可以穿过
      if (!player.onGround && player.y < groundY - 80) return false;
      return Math.abs(obstacle.z) < 35;
    }

    // ============================================================
    // 游戏更新
    // ============================================================
    function update() {
      if (gameOver || !started || paused) return;
      frameCount++;
      // 玩家物理
      player.velocityY += GRAVITY;
      player.y += player.velocityY;
      if (player.y + player.height >= groundY) {
        player.y = groundY - player.height;
        player.velocityY = 0;
        player.onGround = true;
      }

      // 跑道切换动画
      player.laneTransition += LANE_SWITCH_SPEED;
      if (player.laneTransition >= 1) {
        player.laneTransition = 1;
        player.lane = player.targetLane;
      }
      const scale50 = projectFast(50).s;
      const startX = getLaneX(player.lane, scale50);
      const endX = getLaneX(player.targetLane, scale50);
      player.laneX = startX + (endX - startX) * player.laneTransition;
      player.x = player.laneX - player.width / 2;

      // 生成障碍物
      spawnTimer++;
      const diff = getDifficulty();
      // 终极模式：障碍物生成间隔更短（density 越大间隔越短）
      const baseInterval = Math.max(25, 55 - Math.floor(speed) * 4);
      const spawnInterval = baseInterval / (diff.density || 1);
      if (spawnTimer > spawnInterval + Math.random() * 25) {
        createObstacle();
        // 高速时偶尔多障碍（终极模式更高概率）
        const doubleChance = diff.density >= 1.5 ? 0.5 : (speed > 3.5 ? 0.35 : 0);
        if (Math.random() < doubleChance) createObstacle();
        // 终极模式偶尔三连障碍
        if (diff.density >= 1.5 && Math.random() > 0.85) createObstacle();
        spawnTimer = 0;
      }

      // 移动障碍物 + 过滤（性能：原地遍历避免创建新数组）
      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].z -= speed;
        if (obstacles[i].z < -80) {
          obstacles[i] = obstacles[obstacles.length - 1];
          obstacles.pop();
        }
      }

      // 碰撞检测
      for (let i = 0; i < obstacles.length; i++) {
        const o = obstacles[i];
        if (isColliding3D(o)) {
          o.hit = true;
          gameOver = true;
          shakeTimer = 15;
          shakeIntensity = 8;
          createParticles(player.x + player.width / 2, player.y + player.height / 2, "#ff0066", isLowPerf ? 15 : 30);
          const finalScore = Math.floor(scoreDisplay / 10);
          if (finalScore > highScore) {
            highScore = finalScore;
            try { localStorage.setItem("parkour3dHighScore", String(highScore)); } catch (e) {}
          }
          break;
        }
      }

      // 更新粒子（原地操作）
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2;
        p.life--;
        if (p.life <= 0) {
          particles[i] = particles[particles.length - 1];
          particles.pop();
        }
      }

      // 屏幕震动
      if (shakeTimer > 0) shakeTimer--;

      // 分数和速度
      score += speed * 0.5;
      // 平滑动画分数
      const target = score;
      scoreDisplay += (target - scoreDisplay) * 0.1;

      // 渐进式加速 2x -> 5x
      if (speed < maxSpeed) {
        if (score > 300) speed += 0.003;
        else if (score > 100) speed += 0.001;
        if (speed > maxSpeed) speed = maxSpeed;
      }
    }

    // ============================================================
    // 绘制 - 跑道
    // ============================================================
    // 绘制 - 跑道（预渲染缓存 + 动态层）
    // ============================================================
    let trackCache = null;        // 离屏 canvas（轨道背景）
    let trackCacheCtx = null;     // 离屏 context
    const TRACK_SCALE = 1.0; // 离屏 canvas 用 1x CSS 尺寸，由 dpr 处理缩放

    function buildTrackCache() {
      // 桌面端不构建缓存（保持原始画质）
      if (!isLowPerf) return;
      const cw = Math.max(1, Math.floor(W * TRACK_SCALE));
      const ch = Math.max(1, Math.floor(H * TRACK_SCALE));
      if (!trackCache) {
        trackCache = document.createElement("canvas");
        trackCacheCtx = trackCache.getContext("2d");
      }
      trackCache.width = cw;
      trackCache.height = ch;
      const t = trackCacheCtx;
      t.setTransform(TRACK_SCALE, 0, 0, TRACK_SCALE, 0, 0);

      const cW = W, cH = H, cG = groundY, cH2 = horizonY, cV = vanishX;

      // 天空
      const skyGrad = t.createLinearGradient(0, 0, 0, cH2);
      skyGrad.addColorStop(0, "#0a0a1a");
      skyGrad.addColorStop(1, "#1a1a3a");
      t.fillStyle = skyGrad;
      t.fillRect(0, 0, cW, cH2);

      // 地面
      const groundGrad = t.createLinearGradient(0, cH2, 0, cH);
      groundGrad.addColorStop(0, "#0a0a1a");
      groundGrad.addColorStop(1, "#1a1a3a");
      t.fillStyle = groundGrad;
      t.fillRect(0, cH2, cW, cH - cH2);

      // 跑道参数
      const farScale = 0.05;
      const nearHalfW = LANE_WIDTH / 2;
      const farHalfW = LANE_WIDTH * farScale / 2;
      const farGapHalf = LANE_GAP * farScale / 2;
      const gapHalfW = LANE_GAP / 2;

      // 跑道面
      for (let lane = 0; lane < LANE_COUNT; lane++) {
        const laneOffset = (lane - 1) * (LANE_WIDTH + LANE_GAP);
        const nearX = cV + laneOffset;
        const farX = cV + laneOffset * farScale;
        t.fillStyle = "rgba(255, 255, 255, 0.12)";
        t.beginPath();
        t.moveTo(farX - farHalfW, cH2);
        t.lineTo(nearX - nearHalfW, cG);
        t.lineTo(nearX + nearHalfW, cG);
        t.lineTo(farX + farHalfW, cH2);
        t.closePath();
        t.fill();
      }

      // 跑道间隔（黑色三角形）
      t.fillStyle = "rgba(0, 0, 0, 0.4)";
      for (let i = 0; i < LANE_COUNT - 1; i++) {
        const idx = i;
        const laneOffset = (idx - 0.5) * (LANE_WIDTH + LANE_GAP) + LANE_WIDTH;
        const nearX = cV + laneOffset;
        const farX = cV + laneOffset * farScale;
        t.beginPath();
        t.moveTo(farX - farGapHalf, cH2);
        t.lineTo(nearX - gapHalfW, cG);
        t.lineTo(nearX + gapHalfW, cG);
        t.lineTo(farX + farGapHalf, cH2);
        t.closePath();
        t.fill();
      }

      // 跑道边框（白色线）
      t.strokeStyle = "#ffffff";
      t.lineWidth = isLowPerf ? 1.5 : 2;
      t.shadowColor = "#ffffff";
      t.shadowBlur = isLowPerf ? 0 : 8;
      for (let lane = 0; lane < LANE_COUNT; lane++) {
        const laneOffset = (lane - 1) * (LANE_WIDTH + LANE_GAP);
        const nearX = cV + laneOffset;
        const farX = cV + laneOffset * farScale;
        t.beginPath();
        t.moveTo(farX - farHalfW, cH2);
        t.lineTo(nearX - nearHalfW, cG);
        t.moveTo(farX + farHalfW, cH2);
        t.lineTo(nearX + nearHalfW, cG);
        t.stroke();
      }
      t.shadowBlur = 0;

      // 蓝色分割线
      t.strokeStyle = "rgba(0, 245, 255, 0.5)";
      t.lineWidth = isLowPerf ? 1.5 : 2;
      t.shadowColor = "#00f5ff";
      t.shadowBlur = isLowPerf ? 0 : 8;
      for (let i = 0; i < LANE_COUNT - 1; i++) {
        const idx = i;
        const laneOffset = (idx - 0.5) * (LANE_WIDTH + LANE_GAP) + LANE_WIDTH;
        const nearX = cV + laneOffset;
        const farX = cV + laneOffset * farScale;
        t.beginPath();
        t.moveTo(farX, cH2);
        t.lineTo(nearX, cG);
        t.stroke();
      }
      t.shadowBlur = 0;
    }

    function drawTrack() {
      // 移动端：绘制预渲染的轨道缓存（一次 drawImage）
      if (isLowPerf && trackCache) {
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(trackCache, 0, 0, W, H);
        ctx.imageSmoothingEnabled = true;
      } else {
        // 桌面端：保持原始高质量绘制
        const skyGrad = ctx.createLinearGradient(0, 0, 0, horizonY);
        skyGrad.addColorStop(0, "#0a0a1a");
        skyGrad.addColorStop(1, "#1a1a3a");
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, horizonY);

        const groundGrad = ctx.createLinearGradient(0, horizonY, 0, H);
        groundGrad.addColorStop(0, "#0a0a1a");
        groundGrad.addColorStop(1, "#1a1a3a");
        ctx.fillStyle = groundGrad;
        ctx.fillRect(0, horizonY, W, H - horizonY);

        const farScale = 0.05;
        const nearHalfW = LANE_WIDTH / 2;
        const farHalfW = LANE_WIDTH * farScale / 2;
        const farGapHalf = LANE_GAP * farScale / 2;
        const gapHalfW = LANE_GAP / 2;

        for (let lane = 0; lane < LANE_COUNT; lane++) {
          const laneOffset = (lane - 1) * (LANE_WIDTH + LANE_GAP);
          const nearX = vanishX + laneOffset;
          const farX = vanishX + laneOffset * farScale;

          ctx.fillStyle = "rgba(255, 255, 255, 0.12)";
          ctx.beginPath();
          ctx.moveTo(farX - farHalfW, horizonY);
          ctx.lineTo(nearX - nearHalfW, groundY);
          ctx.lineTo(nearX + nearHalfW, groundY);
          ctx.lineTo(farX + farHalfW, horizonY);
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = "#ffffff";
          ctx.lineWidth = 2;
          ctx.shadowColor = "#ffffff";
          ctx.shadowBlur = isLowPerf ? 0 : 8;
          ctx.beginPath();
          ctx.moveTo(farX - farHalfW, horizonY);
          ctx.lineTo(nearX - nearHalfW, groundY);
          ctx.moveTo(farX + farHalfW, horizonY);
          ctx.lineTo(nearX + nearHalfW, groundY);
          ctx.stroke();
          ctx.shadowBlur = 0;
        }

        ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
        for (let i = 0; i < LANE_COUNT - 1; i++) {
          const idx = i;
          const laneOffset = (idx - 0.5) * (LANE_WIDTH + LANE_GAP) + LANE_WIDTH;
          const nearX = vanishX + laneOffset;
          const farX = vanishX + laneOffset * farScale;

          ctx.beginPath();
          ctx.moveTo(farX - farGapHalf, horizonY);
          ctx.lineTo(nearX - gapHalfW, groundY);
          ctx.lineTo(nearX + gapHalfW, groundY);
          ctx.lineTo(farX + farGapHalf, horizonY);
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = "rgba(0, 245, 255, 0.5)";
          ctx.lineWidth = 2;
          ctx.shadowColor = "#00f5ff";
          ctx.shadowBlur = isLowPerf ? 0 : 8;
          ctx.beginPath();
          ctx.moveTo(farX, horizonY);
          ctx.lineTo(nearX, groundY);
          ctx.stroke();
          ctx.shadowBlur = 0;
        }
      }

      // 星空（移动端跳过，提升性能）
      if (!isLowPerf) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
        for (let i = 0; i < STARS.length; i++) {
          const star = STARS[i];
          const sx = ((star.x + frameCount * 0.1) % W + W) % W;
          const sy = star.y % Math.max(1, horizonY - 20);
          ctx.beginPath();
          ctx.arc(sx, sy, star.r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // 远景建筑（移动端减少数量+跳过窗户）
      ctx.fillStyle = "#0f0f2a";
      const bldCount = isLowPerf ? 5 : BUILDINGS.length;
      for (let i = 0; i < bldCount; i++) {
        const b = BUILDINGS[i];
        const bx = ((b.x - frameCount * 0.2) % (W + 60) - 30 + W + 60) % (W + 60) - 30;
        const by = horizonY - b.h;
        ctx.fillRect(bx, by, 35, b.h);
        // 桌面端画窗户
        if (!isLowPerf) {
          ctx.fillStyle = "rgba(0, 245, 255, 0.1)";
          for (let wy = by + 6; wy < horizonY - 5; wy += 14) {
            ctx.fillRect(bx + 5, wy, 4, 6);
            ctx.fillRect(bx + 20, wy, 4, 6);
          }
          ctx.fillStyle = "#0f0f2a";
        }
      }

      // 跑道横线（移动端跳过，缓存已含轨道）
      if (!isLowPerf) {
        ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
        ctx.lineWidth = 1;
        const speedMul = speed * 3;
        for (let lane = 0; lane < LANE_COUNT; lane++) {
          const laneOffset = (lane - 1) * (LANE_WIDTH + LANE_GAP);
          ctx.beginPath();
          for (let i = 0; i < TRACK_LINES.length; i++) {
            const z = (frameCount * speedMul + TRACK_LINES[i]) % PERSPECTIVE_DEPTH;
            const proj = projectFast(z);
            if (proj.s < 0.05) continue;
            const lineX = vanishX + laneOffset * proj.s;
            const lw = LANE_WIDTH * proj.s;
            ctx.moveTo(lineX - lw / 2, proj.y);
            ctx.lineTo(lineX + lw / 2, proj.y);
          }
          ctx.stroke();
        }
      }
    }

    // ============================================================
    // 绘制 - 火柴人 / 狗头角色
    // ============================================================
    function drawDogHead(cx, cy, headR) {
      // 移动端简化版本：只画基本形状
      if (isLowPerf) {
        const main = "#f4a460";
        const black = "#0a0a1a";
        const tongue = "#ff5577";
        // 耳朵（合并为单 path）
        ctx.fillStyle = main;
        ctx.beginPath();
        ctx.moveTo(cx - headR * 0.4, cy - headR * 0.5);
        ctx.lineTo(cx - headR * 1.1, cy - headR * 1.6);
        ctx.lineTo(cx - headR * 0.1, cy - headR * 0.9);
        ctx.moveTo(cx + headR * 0.4, cy - headR * 0.5);
        ctx.lineTo(cx + headR * 1.1, cy - headR * 1.6);
        ctx.lineTo(cx + headR * 0.1, cy - headR * 0.9);
        ctx.closePath();
        // 头
        ctx.moveTo(cx + headR, cy);
        ctx.arc(cx, cy, headR, 0, Math.PI * 2);
        ctx.fill();
        // 眼睛
        ctx.fillStyle = black;
        ctx.beginPath();
        ctx.arc(cx - headR * 0.35, cy - headR * 0.1, headR * 0.16, 0, Math.PI * 2);
        ctx.arc(cx + headR * 0.35, cy - headR * 0.1, headR * 0.16, 0, Math.PI * 2);
        ctx.fill();
        // 鼻子
        ctx.beginPath();
        ctx.arc(cx, cy + headR * 0.2, headR * 0.18, 0, Math.PI * 2);
        ctx.fill();
        // 嘴
        ctx.strokeStyle = black;
        ctx.lineWidth = Math.max(1.2, headR * 0.12);
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(cx, cy + headR * 0.32);
        ctx.lineTo(cx, cy + headR * 0.5);
        ctx.moveTo(cx - headR * 0.45, cy + headR * 0.55);
        ctx.quadraticCurveTo(cx, cy + headR * 0.85, cx + headR * 0.45, cy + headR * 0.55);
        ctx.stroke();
        // 舌头
        ctx.fillStyle = tongue;
        ctx.beginPath();
        ctx.arc(cx, cy + headR * 0.78, headR * 0.22, 0, Math.PI * 2);
        ctx.fill();
        return;
      }

      // 桌面端完整版本
      const main = "#f4a460";
      const earInner = "#ff8866";
      const black = "#0a0a1a";
      const tongue = "#ff5577";

      // 耳朵（外）
      ctx.fillStyle = main;
      ctx.beginPath();
      // 左耳
      ctx.moveTo(cx - headR * 0.4, cy - headR * 0.5);
      ctx.lineTo(cx - headR * 1.1, cy - headR * 1.6);
      ctx.lineTo(cx - headR * 0.1, cy - headR * 0.9);
      ctx.closePath();
      // 右耳
      ctx.moveTo(cx + headR * 0.4, cy - headR * 0.5);
      ctx.lineTo(cx + headR * 1.1, cy - headR * 1.6);
      ctx.lineTo(cx + headR * 0.1, cy - headR * 0.9);
      ctx.closePath();
      ctx.fill();

      // 头部主体
      ctx.beginPath();
      ctx.arc(cx, cy, headR, 0, Math.PI * 2);
      ctx.fill();

      // 耳朵（内）
      ctx.fillStyle = earInner;
      ctx.beginPath();
      ctx.moveTo(cx - headR * 0.4, cy - headR * 0.6);
      ctx.lineTo(cx - headR * 0.85, cy - headR * 1.25);
      ctx.lineTo(cx - headR * 0.2, cy - headR * 0.85);
      ctx.closePath();
      ctx.moveTo(cx + headR * 0.4, cy - headR * 0.6);
      ctx.lineTo(cx + headR * 0.85, cy - headR * 1.25);
      ctx.lineTo(cx + headR * 0.2, cy - headR * 0.85);
      ctx.closePath();
      ctx.fill();

      // 脸颊色块（让脸更"梗"）
      ctx.fillStyle = "rgba(255, 180, 130, 0.5)";
      ctx.beginPath();
      ctx.ellipse(cx - headR * 0.55, cy + headR * 0.2, headR * 0.28, headR * 0.18, 0, 0, Math.PI * 2);
      ctx.ellipse(cx + headR * 0.55, cy + headR * 0.2, headR * 0.28, headR * 0.18, 0, 0, Math.PI * 2);
      ctx.fill();

      // 眼睛（黑色圆点）
      ctx.fillStyle = black;
      ctx.beginPath();
      ctx.arc(cx - headR * 0.35, cy - headR * 0.1, headR * 0.16, 0, Math.PI * 2);
      ctx.arc(cx + headR * 0.35, cy - headR * 0.1, headR * 0.16, 0, Math.PI * 2);
      ctx.fill();

      // 眼睛高光
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(cx - headR * 0.3, cy - headR * 0.18, headR * 0.05, 0, Math.PI * 2);
      ctx.arc(cx + headR * 0.4, cy - headR * 0.18, headR * 0.05, 0, Math.PI * 2);
      ctx.fill();

      // 鼻子
      ctx.fillStyle = black;
      ctx.beginPath();
      ctx.ellipse(cx, cy + headR * 0.2, headR * 0.18, headR * 0.12, 0, 0, Math.PI * 2);
      ctx.fill();

      // 鼻子高光
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(cx - headR * 0.04, cy + headR * 0.16, headR * 0.04, 0, Math.PI * 2);
      ctx.fill();

      // 嘴部（笑脸）
      ctx.strokeStyle = black;
      ctx.lineWidth = Math.max(1.2, headR * 0.12);
      ctx.lineCap = "round";
      ctx.beginPath();
      // 上唇
      ctx.moveTo(cx, cy + headR * 0.32);
      ctx.lineTo(cx, cy + headR * 0.5);
      // 微笑弧线（狗头梗标志）
      ctx.moveTo(cx - headR * 0.45, cy + headR * 0.55);
      ctx.quadraticCurveTo(cx, cy + headR * 0.85, cx + headR * 0.45, cy + headR * 0.55);
      ctx.stroke();

      // 舌头（伸出，梗狗头经典特征）
      ctx.fillStyle = tongue;
      ctx.beginPath();
      ctx.ellipse(cx, cy + headR * 0.78, headR * 0.22, headR * 0.28, 0, 0, Math.PI * 2);
      ctx.fill();
      // 舌头中线
      ctx.strokeStyle = "#cc3355";
      ctx.lineWidth = Math.max(0.8, headR * 0.06);
      ctx.beginPath();
      ctx.moveTo(cx, cy + headR * 0.6);
      ctx.lineTo(cx, cy + headR * 1.02);
      ctx.stroke();
    }

    function drawStickman(x, y, w, h, isSliding, runFrame) {
      ctx.save();
      const cx = x + w / 2;
      const color = isSliding ? "#ff00aa" : (selectedCharacter === "dog" ? "#ffaa44" : "#00f5ff");
      ctx.strokeStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = isLowPerf ? 0 : 10;
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      if (isSliding) {
        // 滑铲姿势
        const headY = y + h - 19;
        const bodyY = y + h - 6;
        ctx.beginPath();
        ctx.arc(cx, headY, 6, 0, Math.PI * 2);
        ctx.moveTo(cx, headY + 6);
        ctx.lineTo(cx, bodyY);
        ctx.moveTo(cx, bodyY);
        ctx.lineTo(cx + 19, bodyY + 6);
        ctx.moveTo(cx, bodyY);
        ctx.lineTo(cx - 10, bodyY + 6);
        ctx.stroke();
      } else {
        // 跑步姿势
        const phase = runFrame * 0.35;
        const bodyTopY = y + 19;
        const bodyBotY = y + h - 23;
        const legSwing = Math.sin(phase) * 13;
        const armSwing = Math.sin(phase + Math.PI) * 9;

        // 身体（先画身体，最后画头覆盖）
        ctx.beginPath();
        ctx.moveTo(cx, bodyTopY);
        ctx.lineTo(cx, bodyBotY);
        // 腿
        ctx.moveTo(cx, bodyBotY);
        ctx.lineTo(cx - legSwing, y + h);
        ctx.moveTo(cx, bodyBotY);
        ctx.lineTo(cx + legSwing, y + h);
        // 手臂
        ctx.moveTo(cx, bodyTopY + 4);
        ctx.lineTo(cx - armSwing - 4, bodyTopY + 20);
        ctx.moveTo(cx, bodyTopY + 4);
        ctx.lineTo(cx + armSwing + 4, bodyTopY + 20);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;

      // 头部（根据角色绘制）
      const headY = y + PLAYER_HEAD_OFFSET;
      if (selectedCharacter === "dog") {
        drawDogHead(cx, headY + 8, 11);
      } else {
        // 火柴人：简单圆头
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(cx, headY, 9, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // ============================================================
    // 绘制 - 障碍物
    // ============================================================
    function drawObstacle(o) {
      const proj = projectFast(o.z);
      if (proj.s < 0.02) return;
      const ox = getLaneX(o.lane, proj.s);
      const ow = o.width * proj.s;
      const oh = o.height * proj.s;
      const drawX = ox - ow / 2;
      const drawY = proj.y - oh;
      // 远距离障碍物阴影减弱或省略
      const blur = isLowPerf ? 0 : proj.s * 15;

      ctx.save();
      if (o.type === "railing") {
        ctx.fillStyle = "#ff6600";
        ctx.shadowColor = "#ff6600";
        ctx.shadowBlur = blur;
        // 合并为一条 path
        ctx.beginPath();
        ctx.rect(drawX, drawY, ow, oh * 0.3);
        const pillarW = Math.max(1, ow * 0.08);
        ctx.rect(drawX, drawY, pillarW, oh);
        ctx.rect(drawX + ow - pillarW, drawY, pillarW, oh);
        ctx.fill();

        // 警告条纹（移动端只在近距离绘制）
        if (!isLowPerf || proj.s > 0.5) {
          ctx.fillStyle = "#0a0a1a";
          const stripeH = Math.max(2, 6 * proj.s);
          const stripeGap = Math.max(3, 6 * proj.s);
          const innerW = ow - pillarW * 2;
          for (let i = 0; i < oh * 0.3; i += stripeGap) {
            ctx.fillRect(drawX + pillarW, drawY + i, innerW, Math.min(stripeH, oh * 0.3 - i));
          }
        }
      } else {
        // 小汽车
        ctx.fillStyle = "#ff0044";
        ctx.shadowColor = "#ff0044";
        ctx.shadowBlur = blur;
        const carBodyH = oh * 0.6;
        const carTopH = oh * 0.35;
        const carTopW = ow * 0.6;
        const topOffsetX = (ow - carTopW) / 2;

        // 合并绘制车体
        ctx.beginPath();
        ctx.rect(drawX, drawY + oh * 0.35, ow, carBodyH);
        ctx.rect(drawX + topOffsetX, drawY, carTopW, carTopH);
        ctx.fill();

        // 车窗（移动端只在近距离绘制）
        if (!isLowPerf || proj.s > 0.5) {
          ctx.fillStyle = "#0a0a1a";
          ctx.fillRect(drawX + topOffsetX + 4 * proj.s, drawY + 3 * proj.s, carTopW - 8 * proj.s, carTopH - 6 * proj.s);
        }

        // 车轮（移动端只在近距离绘制）
        if (!isLowPerf || proj.s > 0.6) {
          ctx.fillStyle = "#333333";
          const wheelR = ow * 0.12;
          ctx.beginPath();
          ctx.arc(drawX + ow * 0.25, drawY + oh, wheelR, 0, Math.PI * 2);
          ctx.arc(drawX + ow * 0.75, drawY + oh, wheelR, 0, Math.PI * 2);
          ctx.fill();
        }

        // 尾灯
        ctx.fillStyle = "#ffdd00";
        ctx.fillRect(drawX, drawY + oh * 0.4, ow * 0.1, oh * 0.15);
        ctx.fillRect(drawX + ow * 0.9, drawY + oh * 0.4, ow * 0.1, oh * 0.15);
      }
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // ============================================================
    // 绘制 - 粒子
    // ============================================================
    function drawParticles() {
      if (particles.length === 0) return;
      ctx.save();
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        const alpha = p.life / p.maxLife;
        if (alpha <= 0) continue;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = isLowPerf ? 0 : 6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // ============================================================
    // 暂停菜单按钮

    function getPauseMenuButtons() {
      const labels = [

        key: it.key,

        x: startX,
        y: startY + i * (btnH + gap),

    function drawPauseMenu() {
      // 半透明遮罩
      ctx.fillStyle = "rgba(10, 10, 26, 0.78)";
      ctx.fillRect(0, 0, W, H);

      // 标题
      ctx.fillStyle = "#00f5ff";

      ctx.fillStyle = "#9ca3af";

      // 按钮
      const btns = getPauseMenuButtons();
      for (const b of btns) {
        let scale = 1, lift = 0;
        if (buttonBounce && buttonBounce.key === b.key && buttonBounce.t < 1) {
          const t = buttonBounce.t;
          scale = 1 + 0.16 * Math.sin(Math.PI * t);
          lift = -5 * Math.sin(Math.PI * t);
        }
        const cx = b.x + b.w / 2;
        const cy = b.y + b.h / 2 + lift;
        const w = b.w * scale;
        const h = b.h * scale;
        const x = cx - w / 2;
        const y = cy - h / 2;

        ctx.save();
        // 背景
        ctx.fillStyle = "rgba(255, 255, 255, 0.06)";
        ctx.shadowColor = b.color;
        ctx.shadowBlur = isLowPerf ? 0 : 12;
        roundRect(ctx, x, y, w, h, 10);
        ctx.fill();
        ctx.shadowBlur = 0;
        // 边框
        ctx.strokeStyle = b.color;
        ctx.lineWidth = 2;
        roundRect(ctx, x, y, w, h, 10);
        ctx.stroke();
        // 文字
        ctx.fillStyle = b.color;
        ctx.font = "bold 20px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = b.color;
        ctx.shadowBlur = isLowPerf ? 0 : 8;
        ctx.fillText(b.name, cx, cy);
        ctx.restore();
      }
      ctx.textBaseline = "alphabetic";

    function drawActionButton(b) {

    function drawCharacterButtons(active) {
      const btns = getCharacterButtons();
      for (const b of btns) {
        const isActive = b.key === active;
        let scale = 1, lift = 0;
        if (buttonBounce && buttonBounce.key === ("char_" + b.key) && buttonBounce.t < 1) {
          const t = buttonBounce.t;
          scale = 1 + 0.16 * Math.sin(Math.PI * t);
          lift = -5 * Math.sin(Math.PI * t);
        }
        const cx = b.x + b.w / 2;
        const cy = b.y + b.h / 2 + lift;
        const w = b.w * scale;
        const h = b.h * scale;
        const x = cx - w / 2;
        const y = cy - h / 2;

        ctx.save();
        ctx.fillStyle = isActive ? b.color : "rgba(255, 255, 255, 0.06)";
        ctx.shadowColor = isActive ? b.color : "transparent";
        ctx.shadowBlur = isLowPerf ? 0 : (isActive ? 14 : 0);
        roundRect(ctx, x, y, w, h, 10);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = isActive ? b.color : "rgba(255, 255, 255, 0.2)";
        ctx.lineWidth = isActive ? 2.2 : 1.5;
        roundRect(ctx, x, y, w, h, 10);
        ctx.stroke();
        ctx.fillStyle = isActive ? "#0a0a1a" : "#9ca3af";
        ctx.font = "bold 17px Arial";

    // 难度按钮的位置（在 start 和 gameOver 屏幕中复用）
    // yOffset: 0 = 默认（大厅），负值 = 向上偏移（结束页用）
    function getDifficultyButtons(yOffset) {
      const off = yOffset || 0;
      const labels = Object.keys(DIFFICULTIES);
      const n = labels.length;
      // 按数量动态调整按钮宽度，避免超出屏幕
      let btnW;
      if (n >= 5) btnW = 70;
      else if (n >= 4) btnW = 88;
      else btnW = 130;
      const btnH = 56;
      const gap = n >= 5 ? 8 : (n >= 4 ? 10 : 20);
      const totalW = btnW * n + gap * (n - 1);
      const startX = Math.max(8, (W - totalW) / 2);
      const y = H / 2 - 200 + off;
      return labels.map((key, i) => ({
        key,
        x: startX + i * (btnW + gap),
        y,
        w: btnW,
        h: btnH,
        ...DIFFICULTIES[key]
      }));
    }

    function drawDifficultyButtons(active, yOffset) {
      const btns = getDifficultyButtons(yOffset);
      for (const b of btns) {
        const isActive = b.key === active;
        // 计算弹跳缩放
        let scale = 1, lift = 0;
        if (buttonBounce && buttonBounce.key === b.key && buttonBounce.t < 1) {
          // t 0->1: 先放大到 1.18x 再回弹到 1.0x，伴随上抬
          const t = buttonBounce.t;
          // 弹跳曲线：1 + 0.18 * sin(PI * t)
          scale = 1 + 0.18 * Math.sin(Math.PI * t);
          lift = -6 * Math.sin(Math.PI * t);
        }
        const cx = b.x + b.w / 2;
        const cy = b.y + b.h / 2 + lift;
        const w = b.w * scale;
        const h = b.h * scale;
        const x = cx - w / 2;
        const y = cy - h / 2;

        ctx.save();
        // 背景
        ctx.fillStyle = isActive ? b.color : "rgba(255, 255, 255, 0.06)";
        ctx.shadowColor = isActive ? b.color : "transparent";
        ctx.shadowBlur = isLowPerf ? 0 : (isActive ? 18 : 0);
        roundRect(ctx, x, y, w, h, 12);
        ctx.fill();
        ctx.shadowBlur = 0;
        // 边框
        ctx.strokeStyle = isActive ? b.color : "rgba(255, 255, 255, 0.2)";
        ctx.lineWidth = isActive ? 2.5 : 1.5;
        roundRect(ctx, x, y, w, h, 12);
        ctx.stroke();
        // 文字（按钮多时缩小字号）
        const labels = Object.keys(DIFFICULTIES);
        const n = labels.length;
        const fontSize = n >= 5 ? 13 : (n >= 4 ? 16 : 20);
        ctx.fillStyle = isActive ? "#0a0a1a" : "#9ca3af";
        ctx.font = "bold " + fontSize + "px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(b.name, cx, cy);
        ctx.restore();
      }
      ctx.textBaseline = "alphabetic";
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawGameOver() {

      ctx.fillStyle = "#00f5ff";
      ctx.font = "bold 28px Arial";
      ctx.shadowColor = "#00f5ff";
      ctx.shadowBlur = isLowPerf ? 0 : 10;
      ctx.fillText("得分: " + Math.floor(scoreDisplay / 10), W / 2, H / 2 - 275);
      ctx.shadowBlur = 0;

      ctx.fillStyle = "#8b5cf6";
      ctx.font = "bold 18px Arial";
      ctx.shadowColor = "#8b5cf6";
      ctx.shadowBlur = isLowPerf ? 0 : 8;
      ctx.fillText("最高分: " + highScore, W / 2, H / 2 - 240);
      ctx.shadowBlur = 0;

      if (Math.floor(scoreDisplay / 10) >= highScore && highScore > 0) {
        ctx.fillStyle = "#ffdd00";
        ctx.font = "bold 14px Arial";
        ctx.shadowColor = "#ffdd00";
        ctx.shadowBlur = isLowPerf ? 0 : 10;
        ctx.fillText("🎉 新纪录！", W / 2, H / 2 - 218);
        ctx.shadowBlur = 0;
      }

      // 难度按钮（使用默认位置 H/2-200）
      drawDifficultyButtons(selectedDifficulty);

      // 角色按钮（使用默认位置 H/2-25）
      drawCharacterButtons(selectedCharacter);

      // 重新开始按钮
      drawActionButton(getRestartButton());

      // 操作提示
      ctx.fillStyle = "#6b7280";
      ctx.font = "12px Arial";
      ctx.fillText("按 R 重新开始", W / 2, H / 2 + 155);
    }

    // ============================================================
    // 主绘制
    // ============================================================
    function draw() {
      // 移动端有缓存时跳过清除（drawImage 会覆盖整个画面）
      if (!isLowPerf || !trackCache) {
        ctx.fillStyle = "#0a0a1a";
        ctx.fillRect(0, 0, W, H);
      }

      if (shakeTimer > 0) {
        ctx.save();
        const k = shakeTimer / 15;
        ctx.translate(
          (Math.random() - 0.5) * shakeIntensity * k,
          (Math.random() - 0.5) * shakeIntensity * k
        );
      }

      drawTrack();

      if (started) {
        // 障碍物（已按 z 倒序在创建时维护，这里按插入顺序绘制天然就是远的先画）
        for (let i = 0; i < obstacles.length; i++) {
          drawObstacle(obstacles[i]);
        }
        drawStickman(
          player.x, player.y, player.width, player.height,
          player.isSliding, frameCount
        );
        drawParticles();
        drawHUD();
        drawGameOver();
      } else {
        drawStartScreen();
      }

      if (shakeTimer > 0) ctx.restore();
    }

    // ============================================================
    // 主循环
    // ============================================================
    // 始终更新弹跳动画（在开始页和结束页也要动）
    function updateBounce() {
      if (buttonBounce && buttonBounce.t < 1) {
        buttonBounce.t += 0.08; // 约 12 帧走完
        if (buttonBounce.t >= 1) buttonBounce.t = 1;
      }
    }

    // 移动端限制 60 FPS（桌面端保持 60 FPS）
    const TARGET_FRAME_MS = 16;
    let lastFrameTs = 0;

    function gameLoop(ts) {
      if (ts - lastFrameTs < TARGET_FRAME_MS) {
        requestAnimationFrame(gameLoop);
        return;
      }
      lastFrameTs = ts;
      updateBounce();
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // ============================================================
    // 初始化
    // ============================================================
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    started = false;
    gameOver = true;
    frameCount = 0;
    score = 0;
    scoreDisplay = 0;
    const initDiff = getDifficulty();
    speed = initDiff.startSpeed;
    maxSpeed = initDiff.maxSpeed;
    obstacles = [];
    particles = [];
    player = {
      lane: 1, targetLane: 1,
      x: vanishX - PLAYER_WIDTH / 2, y: groundY - PLAYER_HEIGHT_NORMAL,
      width: PLAYER_WIDTH, height: PLAYER_HEIGHT_NORMAL,
      velocityY: 0, onGround: true,
      isSliding: false, slideTimer: 0,
      laneX: vanishX, laneTransition: 1
    };
    gameLoop();
  </script>
</body>
</html>
